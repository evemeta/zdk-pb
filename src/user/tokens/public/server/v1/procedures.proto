syntax = "proto3";

package user.tokens.public.server.v1;

import "user/users/public/server/v1/entities.proto";

option java_multiple_files = true;
option java_package = "com.evemeta.zdk.pb.user.server.tokens";
option go_package = "gitlab.com/evemeta/zdk/pb/out/go/user/tokens/public/server/v1;tokenspb";

message ExtractRequest {}

message ExtractResponse {
    user.users.public.server.v1.User user = 1;
}

message RefreshRequest {}

message RefreshResponse {
    string token = 1;
}