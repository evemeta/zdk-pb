syntax = "proto3";

package user.tokens.private.v1;

import "user/tokens/private/v1/procedures.proto";

option go_package = "github.com/evemeta/zdk-pb/out/go/user/tokens/private/v1;tokenspb";

service Service {

    rpc Create(CreateRequest) returns (CreateResponse);

    rpc Extract(ExtractRequest) returns (ExtractResponse);

    rpc Refresh(RefreshRequest) returns (RefreshResponse);
}