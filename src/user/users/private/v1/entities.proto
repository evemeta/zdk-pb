syntax = "proto3";

package user.users.private.v1;

import "user/users/private/v1/enums.proto";

option go_package = "github.com/evemeta/zdk-pb/out/go/user/users/private/v1;userspb";

message User {
    string                                    id          = 1;
    string                                    avatar      = 2;
    string                                    fullname    = 3;
    map<string, string>                       metadata    = 6;
    string                                    nickname    = 4;
    repeated user.users.private.v1.Permission permissions = 5;
}