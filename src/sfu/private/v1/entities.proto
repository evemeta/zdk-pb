syntax = "proto3";

package sfu.private.v1;

import "sfu/public/server/v1/enums.proto";

option go_package = "github.com/evemeta/zdk-pb/out/go/sfu/private/v1;sfupb";

message SupportedCodecs {
    repeated CodecInfo video_codecs = 1;
    repeated CodecInfo audio_codecs = 2;
}

message CodecInfo {
    string                      name = 1;
    sfu.public.server.v1.Codec  codec       = 2;
    map<string, string>         fmtp        = 3;
    uint32                      payloadType = 4;
}

message ConnectionUserInfo {
    string session_id = 1;
    string user_id    = 2;
    string room_id    = 3;
}

message RecordingHeader {
    string user_id = 1;
    string room_id = 2;
    string connection_id = 3;
    int64 start_time = 4;
    int64 end_time = 5;
    repeated RecordingStream streams = 6;
}

message RecordingStream {
    sfu.public.server.v1.StreamType stream_type = 1;
    int64 start_time = 4;

    uint64 ntp_time = 5;
    uint32 rtp_time = 6;
}