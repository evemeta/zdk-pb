syntax = "proto3";

package chat.members.private.v1;

import "chat/members/private/v1/enums.proto";
import "chat/members/private/v1/entities.proto";
import "chat/members/private/v1/optionals.proto";
import "gateway/transponders/private/v1/procedures.proto";

option go_package = "gitlab.com/evemeta/zdk/pb/out/go/chat/members/private/v1;memberspb";

message CountArgument {
    bool                          cache = 1;
    chat.members.private.v1.Query query = 2;
}

message CountRequest {
    repeated chat.members.private.v1.CountArgument arguments = 1;
}

message CountResponse {
    int64 total = 1;
}

message RangeArgument {
    bool                          cache = 1;
    chat.members.private.v1.Query query = 2;
}

message RangeRequest {
    repeated chat.members.private.v1.RangeArgument arguments = 1;
}

message RangeResponse {
    repeated chat.members.private.v1.Chunk chunks = 1;
}

message SelectArgument {
    bool                          cache = 1;
    chat.members.private.v1.Query query = 2;
}

message SelectRequest {
    repeated chat.members.private.v1.SelectArgument arguments = 1;
}

message SelectResponse {
    repeated chat.members.private.v1.Member members = 1;
}

message CreateArgument {
    string                                      id           = 1;
    string                                      user_id      = 2;
    string                                      chat_id      = 3;
    chat.members.private.v1.Status              status       = 4;
    repeated chat.members.private.v1.Permission permissions  = 9;
    map<string, string>                         metadata     = 5;
    int64                                       enter_time   = 7;
    int64                                       leave_time   = 8;
}

message CreateRequest {
    repeated chat.members.private.v1.CreateArgument arguments = 1;
}

message CreateResponse {
    repeated chat.members.private.v1.Member members = 1;
}

message CreateMutation {
    chat.members.private.v1.CreateArgument     foundation      = 1;
    chat.members.private.v1.CreateCondition    condition       = 2;
    repeated chat.members.private.v1.Transient transient       = 3;
    int64                                      begin_timestamp = 4;
    int64                                      close_timestamp = 5;
}

message CreateCondition {
    repeated gateway.transponders.private.v1.CreateMutation create_transponder_mutations = 1;
}

message CreateTransaction {
    repeated chat.members.private.v1.CreateMutation mutations = 1;
}

message UpdateArgument {
    chat.members.private.v1.Query                   query    = 1;
    optional chat.members.private.v1.OptionalString user_id  = 2;
    optional chat.members.private.v1.OptionalString chat_id  = 3;
    optional chat.members.private.v1.OptionalMap    metadata = 4;
}

message UpdateRequest {
    repeated chat.members.private.v1.UpdateArgument arguments = 1;
}

message UpdateResponse {
    repeated chat.members.private.v1.Member members = 1;
}

message UpdateMutation {
    chat.members.private.v1.UpdateArgument     foundation      = 1;
    repeated chat.members.private.v1.Transient transient       = 2;
    int64                                      begin_timestamp = 3;
    int64                                      close_timestamp = 4;
}

message UpdateTransaction {
    repeated chat.members.private.v1.UpdateMutation mutations = 1;
}

message DeleteArgument {
    chat.members.private.v1.Query query = 1;
}

message DeleteRequest {
    repeated chat.members.private.v1.DeleteArgument arguments = 1;
}

message DeleteResponse {
    repeated chat.members.private.v1.Member members = 1;
}

message DeleteMutation {
    chat.members.private.v1.DeleteArgument     foundation      = 1;
    chat.members.private.v1.DeleteCondition    condition       = 2;
    repeated chat.members.private.v1.Transient transient       = 3;
    int64                                      begin_timestamp = 4;
    int64                                      close_timestamp = 5;
}

message DeleteCondition {
    repeated gateway.transponders.private.v1.DeleteMutation delete_transponder_mutations = 1;
}

message DeleteTransaction {
    repeated chat.members.private.v1.DeleteMutation mutations = 1;
}

message KickArgument {
    chat.members.private.v1.Query query  = 1;
    string                        reason = 2;
}

message KickRequest {
    repeated chat.members.private.v1.KickArgument arguments = 1;
}

message KickResponse {}

message KickMutation {
    chat.members.private.v1.KickArgument  foundation      = 1;
    chat.members.private.v1.KickCondition condition       = 2;
    int64                                 begin_timestamp = 3;
    int64                                 close_timestamp = 4;
}

message KickCondition {
    repeated chat.members.private.v1.UpdateMutation         update_mutations             = 1;
    repeated gateway.transponders.private.v1.DeleteMutation delete_transponder_mutations = 2;
}

message KickTransaction {
    repeated chat.members.private.v1.KickMutation mutations = 1;
}
