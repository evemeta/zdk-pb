syntax = "proto3";

package chat.members.private.v1;

import "chat/members/private/v1/enums.proto";

option go_package = "github.com/evemeta/zdk-pb/out/go/chat/members/private/v1;memberspb";

message OptionalMap {
    map<string, string> value = 1;
}

message OptionalString {
    string value = 1;
}

message OptionalPermissions {
    repeated chat.members.private.v1.Permission value = 1;
}