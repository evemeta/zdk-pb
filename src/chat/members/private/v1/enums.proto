syntax = "proto3";

package chat.members.private.v1;


option go_package = "gitlab.com/evemeta/zdk/pb/out/go/chat/members/private/v1;memberspb";

enum Order {
    OrderUnknown    = 0;
    OrderAscending  = 1;
    OrderDescending = 2;
}

enum Status {
    StatusUnknown = 0;
    StatusConnected  = 1;
    StatusDisconnected = 2;
}

enum Permission {
    	PermissionUnknown              = 0;
    	PermissionChat                 = 100;
    	PermissionChatBlock            = 101;
    	PermissionChatUnblock          = 102;
    	PermissionChatMute             = 103;
    	PermissionChatUnmute           = 104;
    	PermissionChatMessageDelete    = 105;
    	PermissionChatKick             = 106;
    	permissionChatSlowmode         = 107;
    	permissionChatSlowmodeBypass   = 108;
}