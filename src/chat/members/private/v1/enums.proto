syntax = "proto3";

package chat.members.private.v1;


option go_package = "gitlab.com/evemeta/zdk/pb/out/go/chat/members/private/v1;memberspb";

enum Order {
    OrderUnknown    = 0;
    OrderAscending  = 1;
    OrderDescending = 2;
}

enum Status {
    StatusUnknown = 0;
    StatusConnected  = 1;
    StatusDisconnected = 2;
}

enum RestrictionKind {
    RestrictionKindUnknown = 0;
    RestrictionKindMute    = 1;
    RestrictionKindBlock   = 2;
}
