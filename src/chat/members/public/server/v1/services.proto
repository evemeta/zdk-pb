    rpc Unmute(UnmuteRequest) returns (UnmuteResponse) {
        option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
            description: "Description: Unmute";
            summary: "Unmute";
            operation_id: "Unmute";
        };
