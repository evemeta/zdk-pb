    rpc Unblock(UnblockRequest) returns (UnblockResponse) {
        option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
            description: "Description: Unblock";
            summary: "Unblock";
            operation_id: "Unblock";
        };
    }
}