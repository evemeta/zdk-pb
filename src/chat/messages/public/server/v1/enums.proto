syntax = "proto3";

package chat.messages.public.server.v1;


option java_multiple_files = true;
option java_package = "com.evemeta.zdk.pb.chat.server.messages";
option go_package = "gitlab.com/evemeta/zdk/pb/out/go/chat/messages/public/server/v1;messagespb";

// Order represents an enumeration that specifies the sort order for data retrieval, particularly in the context of querying.
enum Order {
    OrderUnknown    = 0;
    OrderAscending  = 1;
    OrderDescending = 2;
}