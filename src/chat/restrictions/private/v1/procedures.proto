syntax = "proto3";

package chat.restrictions.private.v1;

import "chat/members/private/v1/procedures.proto";
import "chat/restrictions/private/v1/enums.proto";
import "chat/restrictions/private/v1/entities.proto";

option go_package = "github.com/evemeta/zdk-pb/out/go/chat/restrictions/private/v1;restrictionspb";

message CountArgument {
    bool                               cache = 1;
    chat.restrictions.private.v1.Query query = 2;
}

message CountRequest {
    repeated chat.restrictions.private.v1.CountArgument arguments = 1;
}

message CountResponse {
    int64 total = 1;
}

message RangeArgument {
    bool                               cache = 1;
    chat.restrictions.private.v1.Query query = 2;
}

message RangeRequest {
    repeated chat.restrictions.private.v1.RangeArgument arguments = 1;
}

message RangeResponse {
    repeated chat.restrictions.private.v1.Chunk chunks = 1;
}

message SelectArgument {
    bool                               cache = 1;
    chat.restrictions.private.v1.Query query = 2;
}

message SelectRequest {
    repeated chat.restrictions.private.v1.SelectArgument arguments = 1;
}

message SelectResponse {
    repeated chat.restrictions.private.v1.Restriction restrictions = 1;
}

message CreateArgument {
    string                            id       = 1;
    string                            user_id  = 2;
    string                            chat_id  = 3;
    chat.restrictions.private.v1.Kind kind     = 4;
    string                            reason   = 5;
    int64                             duration = 6;
}

message CreateRequest {
    repeated chat.restrictions.private.v1.CreateArgument arguments = 1;
}

message CreateResponse {
    repeated chat.restrictions.private.v1.Restriction restrictions = 1;
}

message CreateMutation {
    chat.restrictions.private.v1.CreateArgument     foundation      = 1;
    chat.restrictions.private.v1.CreateCondition    condition       = 2;
    repeated chat.restrictions.private.v1.Transient transient       = 3;
    int64                                           begin_timestamp = 4;
    int64                                           close_timestamp = 5;
}

message CreateCondition {
    repeated chat.members.private.v1.KickMutation kick_member_mutations = 1;
}

message CreateTransaction {
    repeated chat.restrictions.private.v1.CreateMutation mutations = 1;
}

message DeleteArgument {
    chat.restrictions.private.v1.Query query = 1;
}

message DeleteRequest {
    repeated chat.restrictions.private.v1.DeleteArgument arguments = 1;
}

message DeleteResponse {
    repeated chat.restrictions.private.v1.Restriction restrictions = 1;
}

message DeleteMutation {
    chat.restrictions.private.v1.DeleteArgument     foundation      = 1;
    repeated chat.restrictions.private.v1.Transient transient       = 2;
    int64                                           begin_timestamp = 3;
    int64                                           close_timestamp = 4;
}

message DeleteTransaction {
    repeated chat.restrictions.private.v1.DeleteMutation mutations = 1;
}
