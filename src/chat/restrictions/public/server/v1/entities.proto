syntax = "proto3";

package chat.restrictions.public.server.v1;

import "chat/restrictions/public/server/v1/enums.proto";

option java_multiple_files = true;
option java_package = "com.evemeta.zdk.pb.chat.server.restrictions";
option go_package = "gitlab.com/evemeta/zdk/pb/out/go/chat/restrictions/public/server/v1;restrictionspb";

// Chunk represents a segmented portion of restrictions used for pagination or segmented data retrieval.
// It provides insights about the desired chunk size, its position within the overall dataset, and the actual restrictions it contains.
message Chunk {
    // Represents the desired size of the chunk, not necessarily the actual number of entities it contains.
    int64 size = 1;
    // Represents the position of this chunk within the context of pagination.
    int64 index = 2;
    // Represents the total count of entities across all chunks.
    int64 total = 3;
    // Represents the actual restrictions included in this chunk.
    repeated chat.restrictions.public.server.v1.Restriction entities = 4;
}

// Query represents a structure designed to facilitate specific and conditional data retrieval.
// It contains order specifications, limitations on the number of results, and conditions to filter data.
message Query {
    // Represents the order in which results should be retrieved.
    chat.restrictions.public.server.v1.Order order = 1;
    // Represents the maximum number of results to be fetched.
    int64 limit = 2;
    // Represents the starting point from which to retrieve results.
    int64 offset = 3;
    // Represents the set of conditions that filter the data retrieval process.
    chat.restrictions.public.server.v1.Condition condition = 4;
}

// Timeframe represents a specific span or duration marked by its commencement and completion times.
// It provides a clear boundary to understand when a particular activity began and when it ended.
message Timeframe {
    // Represents the timestamp indicating when the activity or retrieve of data commenced.
    int64 commence = 1;
    // Represents the timestamp indicating when the activity or retrieve of data completed.
    int64 complete = 2;
}

// Condition represents a set of criteria designed to filter data during retrieval.
// It provides mechanisms to specifically target restrictions based on identifiers or chat affiliations.
message Condition {
    // Represents a list of restriction identifiers for targeted data retrieval.
    repeated string ids = 1;
    // todo;
    repeated string user_ids = 2;
    // Represents a list of chat identifiers to filter restrictions based on their association.
    repeated string chat_ids = 3;
}

// Restriction todo;
message Restriction {
    // Represents the unique identifier for this restriction.
    string id = 1;
    string user_id = 2;
    string chat_id = 3;
    chat.restrictions.public.server.v1.Kind kind = 4;
    string reason = 5;
    int64 create_time = 6;
    int64 expire_time = 7;
}
