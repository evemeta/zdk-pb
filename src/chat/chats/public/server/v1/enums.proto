syntax = "proto3";

package chat.chats.public.server.v1;

option java_multiple_files = true;
option java_package = "com.evemeta.zdk.pb.chat.server.chats";
option go_package = "gitlab.com/evemeta/zdk/pb/out/go/chat/chats/public/server/v1;chatspb";

// Kind todo;
enum Kind {
    KindUnknown     = 0;
    KindDependent   = 1;
    KindIndependent = 2;
}

// Order represents an enumeration that specifies the sort order for data retrieval, particularly in the context of querying.
enum Order {
    OrderUnknown    = 0;
    OrderAscending  = 1;
    OrderDescending = 2;
}

// SlowmodeStatus represents an enumeration that specifies whether numbers of messages user can send in specified window of time is limited
enum SlowmodeStatus {
    SlowmodeStatusUnknown  = 0;
    SlowmodeStatusEnabled  = 1;
    SlowmodeStatusDisabled = 2;
}