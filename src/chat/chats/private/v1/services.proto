syntax = "proto3";

package chat.chats.private.v1;

import "chat/chats/private/v1/procedures.proto";

option go_package = "github.com/evemeta/zdk-pb/out/go/chat/chats/private/v1;chatspb";

service Service {

    rpc Count(CountRequest) returns (CountResponse);

    rpc Range(RangeRequest) returns (RangeResponse);

    rpc Select(SelectRequest) returns (SelectResponse);

    rpc Create(CreateRequest) returns (CreateResponse);

    rpc InitiateCreateMutations(CreateTransaction) returns (CreateTransaction);

    rpc ValidateCreateMutations(CreateTransaction) returns (CreateTransaction);

    rpc FinalizeCreateMutations(CreateTransaction) returns (CreateTransaction);

    rpc AnnounceCreateMutations(CreateTransaction) returns (CreateTransaction);

    rpc RollbackCreateMutations(CreateTransaction) returns (CreateTransaction);

    rpc Update(UpdateRequest) returns (UpdateResponse);

    rpc InitiateUpdateMutations(UpdateTransaction) returns (UpdateTransaction);

    rpc ValidateUpdateMutations(UpdateTransaction) returns (UpdateTransaction);

    rpc FinalizeUpdateMutations(UpdateTransaction) returns (UpdateTransaction);

    rpc AnnounceUpdateMutations(UpdateTransaction) returns (UpdateTransaction);

    rpc RollbackUpdateMutations(UpdateTransaction) returns (UpdateTransaction);

    rpc Delete(DeleteRequest) returns (DeleteResponse);

    rpc InitiateDeleteMutations(DeleteTransaction) returns (DeleteTransaction);

    rpc FinalizeDeleteMutations(DeleteTransaction) returns (DeleteTransaction);

    rpc AnnounceDeleteMutations(DeleteTransaction) returns (DeleteTransaction);

    rpc RollbackDeleteMutations(DeleteTransaction) returns (DeleteTransaction);

    rpc Enter(EnterRequest) returns (EnterResponse);

    rpc InitiateEnterMutations(EnterTransaction) returns (EnterTransaction);

    rpc ValidateEnterMutations(EnterTransaction) returns (EnterTransaction);

    rpc FinalizeEnterMutations(EnterTransaction) returns (EnterTransaction);

    rpc AnnounceEnterMutations(EnterTransaction) returns (EnterTransaction);

    rpc RollbackEnterMutations(EnterTransaction) returns (EnterTransaction);

    rpc Leave(LeaveRequest) returns (LeaveResponse);

    rpc InitiateLeaveMutations(LeaveTransaction) returns (LeaveTransaction);

    rpc ValidateLeaveMutations(LeaveTransaction) returns (LeaveTransaction);

    rpc FinalizeLeaveMutations(LeaveTransaction) returns (LeaveTransaction);

    rpc AnnounceLeaveMutations(LeaveTransaction) returns (LeaveTransaction);

    rpc RollbackLeaveMutations(LeaveTransaction) returns (LeaveTransaction);

    rpc EnableSlowmode(EnableSlowmodeRequest) returns (EnableSlowmodeResponse);

    rpc InitiateEnableSlowmodeMutations(EnableSlowmodeTransaction) returns (EnableSlowmodeTransaction);

    rpc FinalizeEnableSlowmodeMutations(EnableSlowmodeTransaction) returns (EnableSlowmodeTransaction);

    rpc AnnounceEnableSlowmodeMutations(EnableSlowmodeTransaction) returns (EnableSlowmodeTransaction);

    rpc RollbackEnableSlowmodeMutations(EnableSlowmodeTransaction) returns (EnableSlowmodeTransaction);

    rpc DisableSlowmode(DisableSlowmodeRequest) returns (DisableSlowmodeResponse);

    rpc InitiateDisableSlowmodeMutations(DisableSlowmodeTransaction) returns (DisableSlowmodeTransaction);

    rpc FinalizeDisableSlowmodeMutations(DisableSlowmodeTransaction) returns (DisableSlowmodeTransaction);

    rpc AnnounceDisableSlowmodeMutations(DisableSlowmodeTransaction) returns (DisableSlowmodeTransaction);

    rpc RollbackDisableSlowmodeMutations(DisableSlowmodeTransaction) returns (DisableSlowmodeTransaction);
}