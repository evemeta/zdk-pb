syntax = "proto3";

package chat.chats.private.v1;


option go_package = "gitlab.com/evemeta/zdk/pb/out/go/chat/chats/private/v1;chatspb";

enum Kind {
    KindUnknown     = 0;
    KindDependent   = 1;
    KindIndependent = 2;
}

enum Order {
    OrderUnknown    = 0;
    OrderAscending  = 1;
    OrderDescending = 2;
}

enum Permission {
    PermissionUnknown              = 0;
    PermissionChat                 = 100;
    PermissionChatBlock            = 101;
    PermissionChatUnblock          = 102;
    PermissionChatMute             = 103;
    PermissionChatUnmute           = 104;
    PermissionChatMessageDelete    = 105;
    PermissionChatKick             = 106;
    PermissionChatSlowmode         = 107;
    PermissionChatSlowmodeBypass   = 108;
}

enum SlowmodeStatus {
    SlowmodeStatusUnknown  = 0;
    SlowmodeStatusEnabled  = 1;
    SlowmodeStatusDisabled = 2;
}