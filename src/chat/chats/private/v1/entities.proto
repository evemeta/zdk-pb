syntax = "proto3";

package chat.chats.private.v1;

import "chat/chats/private/v1/enums.proto";
import "chat/members/private/v1/entities.proto";
import "chat/messages/private/v1/entities.proto";

option go_package = "github.com/evemeta/zdk-pb/out/go/chat/chats/private/v1;chatspb";

message Chat {
    string                         id          = 1;
    chat.chats.private.v1.Kind     kind        = 2;
    map<string, string>            metadata    = 3;
    chat.chats.private.v1.Slowmode slowmode    = 4;
    int64                          access_time = 5;
    int64                          create_time = 6;
    int64                          update_time = 7;
}

message Slowmode {
    chat.chats.private.v1.SlowmodeStatus status = 1;
    int64 limit = 2;
    int64 window = 3;
}

message Chunk {
    int64                               size     = 1;
    int64                               index    = 2;
    int64                               total    = 3;
    repeated chat.chats.private.v1.Chat entities = 4;
}

message Query {
    chat.chats.private.v1.Order              order      = 1;
    int64                                    limit      = 2;
    int64                                    offset     = 3;
    repeated chat.chats.private.v1.Condition conditions = 4;
}

message Condition {
    repeated string                         ids      = 1;
    repeated chat.members.private.v1.Query  members  = 2;
    repeated chat.messages.private.v1.Query messages = 3;
}

message Transient {
    chat.chats.private.v1.Chat future   = 1;
    chat.chats.private.v1.Chat current  = 2;
    chat.chats.private.v1.Chat previous = 3;
}