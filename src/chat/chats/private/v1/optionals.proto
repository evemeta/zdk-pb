syntax = "proto3";

package chat.chats.private.v1;

option go_package = "gitlab.com/evemeta/zdk/pb/out/go/chat/chats/private/v1;chatspb";

message OptionalMap {
    map<string, string> value = 1;
}

message OptionalInt64 {
    int64 value = 1;
}

message OptionalSlowmode {
    optional chat.chats.private.v1.OptionalInt64 limit = 1;
    optional chat.chats.private.v1.OptionalInt64 window = 2;
}