syntax = "proto3";

package chat.tokens.private.v1;

import "chat/tokens/private/v1/procedures.proto";

option go_package = "github.com/evemeta/zdk-pb/out/go/chat/tokens/private/v1;tokenspb";

service Service {

    rpc Create(CreateRequest) returns (CreateResponse);

    rpc Extract(ExtractRequest) returns (ExtractResponse);
}