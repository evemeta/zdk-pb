syntax = "proto3";

package mcu.rooms.private.v1;

import "mcu/rooms/private/v1/procedures.proto";
import "mcu/rooms/private/v1/packets.proto";

option go_package = "github.com/evemeta/zdk-pb/out/go/mcu/rooms/private/v1;roomspb";

service Service {
    rpc Create(CreateRequest) returns (CreateResponse);
    rpc Delete(DeleteRequest) returns (DeleteResponse);
    rpc Select(SelectRequest) returns (SelectResponse);
    rpc Count(CountRequest)   returns (CountResponse);
}