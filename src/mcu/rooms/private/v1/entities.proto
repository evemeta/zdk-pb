syntax = "proto3";

package mcu.rooms.private.v1;

import "mcu/rooms/private/v1/enums.proto";

option go_package = "github.com/evemeta/zdk-pb/out/go/mcu/rooms/private/v1;roomspb";

message Empty {}

message Room {
    string id = 1;
}

message Query {
    mcu.rooms.private.v1.Order                 order = 1;
    int64                                      limit = 2;
    int64                                      offset = 3;
    repeated mcu.rooms.private.v1.Condition    conditions = 4;
}

message Condition {
    repeated string ids = 1;
}