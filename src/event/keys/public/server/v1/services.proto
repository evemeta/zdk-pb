syntax = "proto3";

package event.keys.public.server.v1;

import "event/keys/public/server/v1/procedures.proto";

option java_multiple_files = true;
option java_package = "com.evemeta.zdk.pb.event.server.keys";
option go_package = "github.com/evemeta/zdk-pb/out/go/event/keys/public/server/v1;keyspb";

service Service {

    // Count represents a procedure that retrieves the total number of keys based on a specific query.
    rpc Count(CountRequest) returns (CountResponse);

    // Range represents a procedure that retrieves a chunk of keys based on a specific query.
    rpc Range(RangeRequest) returns (RangeResponse);

    // Select represents a procedure that retrieves specific keys based on a specific query.
    rpc Select(SelectRequest) returns (SelectResponse);
}