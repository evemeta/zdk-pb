syntax = "proto3";

package event.keys.public.server.v1;

import "event/keys/public/server/v1/enums.proto";

option java_multiple_files = true;
option java_package = "com.evemeta.zdk.pb.event.server.keys";
option go_package = "github.com/evemeta/zdk-pb/out/go/event/keys/public/server/v1;keyspb";

// Chunk represents a segmented portion of keys used for pagination or segmented data retrieval.
// It provides insights about the desired chunk size, its position within the overall dataset, and the actual keys it contains.
message Chunk {
    // Represents the desired size of the chunk, not necessarily the actual number of entities it contains.
    int64 size = 1;
    // Represents the position of this chunk within the context of pagination.
    int64 index = 2;
    // Represents the total count of entities across all chunks.
    int64 total = 3;
    // Represents the actual keys included in this chunk.
    repeated event.keys.public.server.v1.Key entities = 4;
}

// Query represents a structure designed to facilitate specific and conditional data retrieval.
// It contains order specifications, limitations on the number of results, and conditions to filter data.
message Query {
    // Represents the order in which results should be retrieved.
    event.keys.public.server.v1.Order order = 1;
    // Represents the maximum number of results to be fetched.
    int64 limit = 2;
    // Represents the starting point from which to retrieve results.
    int64 offset = 3;
    // Represents the set of conditions that filter the data retrieval process.
    event.keys.public.server.v1.Condition condition = 4;
}

// Key represents a participant in a event.
// It contains details for identification, associated metadata, associated restrictions, and timestamps reflecting its creation and last alteration.
message Key {
    // Represents the unique identifier for this key.
    string id = 1;
    // Represents the unique identifier of the user associated with this member.
    string user_id = 2;
    // Represents the unique value associated with this key.
    string value = 3;
    // Represents a collection of key-value pairs providing additional context or information about this key.
    map<string, string> metadata = 4;
    // Represents the timestamp indicating when this key was created or added to the event.
    int64 create_time = 5;
    // Represents the timestamp of the last update associated with this key.
    int64 update_time = 6;
}

// Condition represents a set of criteria designed to filter data during retrieval.
// It provides mechanisms to specifically target keys based on identifiers or event affiliations.
message Condition {
    // Represents a list of key identifiers for targeted data retrieval.
    repeated string ids = 1;
    // Represents a list of user identifiers to filter keys based on their association.
    repeated string user_ids = 2;
    // Represents a list of values to filter keys based on their value.
    repeated string values = 3;
}