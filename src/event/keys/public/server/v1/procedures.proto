syntax = "proto3";

package event.keys.public.server.v1;

import "event/keys/public/server/v1/entities.proto";

option java_multiple_files = true;
option java_package = "com.evemeta.zdk.pb.event.server.keys";
option go_package = "github.com/evemeta/zdk-pb/out/go/event/keys/public/server/v1;keyspb";

// CountRequest represents a message designed to count keys based on a given query.
message CountRequest {
    // Represents the specifications and conditions under which keys should be counted.
    event.keys.public.server.v1.Query query = 1;
}

// CountResponse represents a message that provides the result of the count procedure.
message CountResponse {
    // Represents the total number of keys that match the criteria of the given query.
    int64 total = 1;
}

// SelectRequest represents a message designed to retrieve specific keys based on a given query.
message SelectRequest {
    // Represents the specifications and conditions under which particular keys should be retrieved.
    event.keys.public.server.v1.Query query = 1;
}

// SelectResponse represents a message that provides the result of the select procedure.
message SelectResponse {
    // Represents a list of keys that match the criteria of the given query.
    repeated event.keys.public.server.v1.Key keys = 1;
}

// RangeRequest represents a message designed to retrieve a chunk of keys based on a given query.
message RangeRequest {
    // Represents the specifications and conditions under which a chunk of keys should be retrieved.
    event.keys.public.server.v1.Query query = 1;
}

// RangeResponse represents a message that provides the result of the range procedure.
message RangeResponse {
    // Represents a chunk of keys that match the criteria of the given query.
    event.keys.public.server.v1.Chunk chunk = 1;
}