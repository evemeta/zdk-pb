syntax = "proto3";

package event.keys.private.v1;

import "event/keys/private/v1/enums.proto";
import "event/keys/private/v1/entities.proto";
import "event/keys/private/v1/optionals.proto";
import "gateway/transponders/private/v1/procedures.proto";

option go_package = "github.com/evemeta/zdk-pb/out/go/event/keys/private/v1;keyspb";

message CountArgument {
    bool                        cache = 1;
    event.keys.private.v1.Query query = 2;
}

message CountRequest {
    repeated event.keys.private.v1.CountArgument arguments = 1;
}

message CountResponse {
    int64 total = 1;
}

message RangeArgument {
    bool                        cache = 1;
    event.keys.private.v1.Query query = 2;
}

message RangeRequest {
    repeated event.keys.private.v1.RangeArgument arguments = 1;
}

message RangeResponse {
    repeated event.keys.private.v1.Chunk chunks = 1;
}

message SelectArgument {
    bool                        cache = 1;
    event.keys.private.v1.Query query = 2;
}

message SelectRequest {
    repeated event.keys.private.v1.SelectArgument arguments = 1;
}

message SelectResponse {
    repeated event.keys.private.v1.Key keys = 1;
}

message CreateArgument {
    string              id       = 1;
    string              user_id  = 2;
    map<string, string> metadata = 3;
}

message CreateRequest {
    repeated event.keys.private.v1.CreateArgument arguments = 1;
}

message CreateResponse {
    repeated event.keys.private.v1.Key keys = 1;
}

message CreateMutation {
    event.keys.private.v1.CreateArgument     foundation      = 1;
    repeated event.keys.private.v1.Transient transient       = 2;
    int64                                    begin_timestamp = 3;
    int64                                    close_timestamp = 4;
}

message CreateTransaction {
    repeated event.keys.private.v1.CreateMutation mutations = 1;
}

message UpdateArgument {
    event.keys.private.v1.Query                        query    = 1;
    optional event.keys.private.v1.OptionalString      user_id  = 2;
    optional event.keys.private.v1.OptionalMap         metadata = 3;
}

message UpdateRequest {
    repeated event.keys.private.v1.UpdateArgument arguments = 1;
}

message UpdateResponse {
    repeated event.keys.private.v1.Key keys = 1;
}

message UpdateMutation {
    event.keys.private.v1.UpdateArgument     foundation      = 1;
    repeated event.keys.private.v1.Transient transient       = 2;
    int64                                    begin_timestamp = 3;
    int64                                    close_timestamp = 4;
}

message UpdateTransaction {
    repeated event.keys.private.v1.UpdateMutation mutations = 1;
}

message DeleteArgument {
    event.keys.private.v1.Query query = 1;
}

message DeleteRequest {
    repeated event.keys.private.v1.DeleteArgument arguments = 1;
}

message DeleteResponse {
    repeated event.keys.private.v1.Key keys = 1;
}

message DeleteMutation {
    event.keys.private.v1.DeleteArgument     foundation      = 1;
    repeated event.keys.private.v1.Transient transient       = 2;
    int64                                    begin_timestamp = 3;
    int64                                    close_timestamp = 4;
}

message DeleteTransaction {
    repeated event.keys.private.v1.DeleteMutation mutations = 1;
}