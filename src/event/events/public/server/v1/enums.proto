syntax = "proto3";

package event.events.public.server.v1;

option java_multiple_files = true;
option java_package = "com.evemeta.zdk.pb.event.server.events";
option go_package = "github.com/evemeta/zdk-pb/out/go/event/events/public/server/v1;eventspb";

// Kind represents an enumeration that specifies the type or classification of an event, indicating whether it is dependent on a parent object or independent.
enum Kind {
    KindUnknown     = 0;
    KindDependent   = 1;
    KindIndependent = 2;
}

// Order represents an enumeration that specifies the sort order for data retrieval, particularly in the context of querying.
enum Order {
    OrderUnknown    = 0;
    OrderAscending  = 1;
    OrderDescending = 2;
}

// Status represents an enumeration that specifies the current state of an event, indicating whether it is pending, started, canceled, or finished.
enum Status {
    StatusUnknown     = 0;
    StatusPending     = 1;
    StatusProvisioned = 2;
    StatusStarted     = 3;
    StatusFinished    = 4;
    StatusCanceled    = 5;
}

// Schedule represents an enumeration that specifies the scheduling state of an event, indicating whether it is planned or unplanned.
enum Schedule {
    ScheduleUnknown   = 0;
    SchedulePlanned   = 1;
    ScheduleUnplanned = 2;
}

// McuSourceOrientation represents the orientation of a media stream produced by an MCU source.
// It specifies whether the stream is presented in a vertical or horizontal layout.
enum McuSourceOrientation {
    McuSourceOrientationUnknown    = 0;
    McuSourceOrientationVertical   = 1;
    McuSourceOrientationHorizontal = 2;
}

// McuSourceVideoOutput represents the video output profile used by an MCU source.
// It defines the resolution, frame rate, and codec configuration used when generating the video stream.
enum McuSourceVideoOutput {
    VideoOutputUnknown     = 0;
    VideoOutput1080p60H264 = 1;
    VideoOutput1080p30H264 = 2;
    VideoOutput720p30H264  = 3;
    VideoOutput540p30H264  = 4;
    VideoOutput360p30H264  = 5;
    VideoOutput2160p60AV1  = 6;
    VideoOutput2160p30AV   = 7;
    VideoOutput1080p30AV1  = 8;
    VideoOutput1080p60AV1  = 9;
    VideoOutput720p30AV1   = 10;
    VideoOutput540p30AV1   = 11;
    VideoOutput360p30AV1   = 12;
}

// McuSourceAudioOutput represents the audio output profile used by an MCU source.
// It defines the audio bitrate and codec configuration used when generating the audio stream.
enum McuSourceAudioOutput {
    AudioOutputUnknown = 0;
    AudioOutput64kOPUS = 1;
    AudioOutput64kAAC  = 2;
}