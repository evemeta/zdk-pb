syntax = "proto3";

package event.events.public.server.v1;

import "event/events/public/server/v1/enums.proto";
import "chat/chats/public/server/v1/entities.proto";
import "event/members/public/server/v1/entities.proto";

option java_multiple_files = true;
option java_package = "com.evemeta.zdk.pb.event.server.events";
option go_package = "github.com/evemeta/zdk-pb/out/go/event/events/public/server/v1;eventspb";

// Event represents a conversation environment.
// It contains details for identification, associated metadata, and timestamps reflecting its creation and last alteration.
message Event {
    // Represents the unique identifier for this event.
    string id = 1;
    // Determines whatever the event is dependent or independent, it may depend on a parent object.
    event.events.public.server.v1.Kind kind = 2;
    // Represents the status of the event (pending, started, finished or canceled).
    event.events.public.server.v1.Status status = 3;
    // The source associated with this event, containing properties.
    event.events.public.server.v1.Source source = 4;
    // Represents a collection of key-value pairs providing additional context or information about this event.
    map<string, string> metadata = 5;
    // Indicates whether the event is scheduled or unscheduled.
    event.events.public.server.v1.Schedule schedule = 6;
    // Represents the planned start time of the event.
    int64 planned_start_time = 7;
    // Represents the timestamp indicating when this event was started.
    int64 start_time  = 8;
    // Represents the planned finish time of the event.
    int64 planned_finish_time = 9;
    // Represents the timestamp indicating when this event was finished.
    int64 finish_time = 10;
    // Represents the timestamp indicating when this event was canceled.
    int64 cancel_time = 11;
    // Represents the timestamp indicating when this event was created.
    int64 create_time = 12;
    // Represents the timestamp of the last update associated with this event.
    int64 update_time = 13;
}

// Source represents the origin of media associated with an event.
// It encapsulates the specific source type responsible for providing the media
message Source {
    oneof source {
        // Represents a source provided by an MCU streamer instance.
        event.events.public.server.v1.McuStreamerSource mcu_streamer_source = 1;
        // Represents a source provided by an MCU room instance.
        event.events.public.server.v1.McuRoomSource     mcu_room_source     = 2;
        // Represents a source delivered through an external DASH stream.
        event.events.public.server.v1.DashSource        dash_source        = 3;
    }
}

// McuStreamerSource represents a media source produced by an MCU streamer.
// It defines the configuration used by the MCU when generating the media stream
message McuStreamerSource {
    // Represents the orientation of the stream generated by the MCU.
    events.public.server.v1.McuSourceOrientation orientation = 1;
    // Represents the video output profile used by the MCU for the stream.
    repeated events.public.server.v1.McuSourceVideoOutput video_outputs = 2;
    // Represents the audio output profile used by the MCU for the stream.
    repeated events.public.server.v1.McuSourceAudioOutput audio_outputs = 3;
}

// McuRoomSource represents a media source produced by an MCU room.
// It defines the configuration used by the MCU when generating the media stream
message McuRoomSource {
    // Represents the orientation of the stream generated by the MCU.
    events.public.server.v1.McuSourceOrientation orientation = 1;
    // Represents the video output profile used by the MCU for the stream.
    repeated events.public.server.v1.McuSourceVideoOutput video_outputs = 2;
    // Represents the audio output profile used by the MCU for the stream.
    repeated events.public.server.v1.McuSourceAudioOutput audio_outputs = 3;
}

// DashSource represents a media source delivered via a DASH stream.
// It references an external DASH manifest
message DashSource {
    // Represents the URL of the DASH manifest used to access the stream.
    string url = 1;
}

// Chunk represents a segmented portion of events used for pagination or segmented data retrieval.
// It provides insights about the desired chunk size, its position within the overall dataset, and the actual events it contains.
message Chunk {
    // Represents the desired size of the chunk, not necessarily the actual number of entities it contains.
    int64 size = 1;
    // Represents the position of this chunk within the context of pagination.
    int64 index = 2;
    // Represents the total count of entities across all chunks.
    int64 total = 3;
    // Represents the actual events included in this chunk.
    repeated event.events.public.server.v1.Event entities = 4;
}

// Query represents a structure designed to facilitate specific and conditional data retrieval.
// It contains order specifications, limitations on the number of results, and conditions to filter data.
message Query {
    // Represents the order in which results should be retrieved.
    event.events.public.server.v1.Order order = 1;
    // Represents the maximum number of results to be fetched.
    int64 limit = 2;
    // Represents the starting point from which to retrieve results.
    int64 offset = 3;
    // Represents the set of conditions that filter the data retrieval process.
    event.events.public.server.v1.Condition condition = 4;
}

// Context represents a comprehensive snapshot of the current state of the event.
// It contains details about the event, its members, and recent messages, while also noting the timeframes associated with each data retrieval.
message Context {
    // Represents the comprehensive details of the event.
    event.events.public.server.v1.Event event = 1;
    // Represents the specific span of time, containing the commence and complete timestamps associated with the retrieval of event from the database.
    event.events.public.server.v1.Timeframe event_timeframe = 2;
    // Represents the comprehensive details of the chat associated with the event.
    chat.chats.public.server.v1.Chat chat = 3;
    // Represents the specific span of time, containing the commence and complete timestamps associated with the retrieval of chat from the database.
    event.events.public.server.v1.Timeframe chat_timeframe = 4;
    // Represents the comprehensive details of the member currently accessing or interacting with the event.
    event.members.public.server.v1.Member member = 5;
    // Represents the specific span of time, containing the commence and complete timestamps associated with the retrieval of member from the database.
    event.events.public.server.v1.Timeframe member_timeframe = 6;
    // Represents the total number of members who are presently online in the event.
    int64 members = 7;
    // Represents the specific span of time, containing the commence and complete timestamps associated with the retrieval of members from the database.
    event.events.public.server.v1.Timeframe members_timeframe = 8;
}

// Condition represents a set of criteria designed to filter data during retrieval.
// It provides mechanisms to specifically target events based on identifiers.
message Condition {
    // Represents a list of event identifiers for targeted data retrieval.
    repeated string ids = 1;
}

// Timeframe represents a specific span or duration marked by its commencement and completion times.
// It provides a clear boundary to understand when a particular activity began and when it ended.
message Timeframe {
    // Represents the timestamp indicating when the activity or retrieve of data commenced.
    int64 commence = 1;
    // Represents the timestamp indicating when the activity or retrieve of data completed.
    int64 complete = 2;
}