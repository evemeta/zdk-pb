syntax = "proto3";

package event.events.public.server.v1;

import "event/events/public/server/v1/procedures.proto";

option java_multiple_files = true;
option java_package = "com.evemeta.zdk.pb.event.server.events";
option go_package = "github.com/evemeta/zdk-pb/out/go/event/events/public/server/v1;eventspb";

service Service {

    // Count represents a procedure that retrieves the total number of events based on a specific query.
    rpc Count(CountRequest) returns (CountResponse);

    // Range represents a procedure that retrieves a chunk of events based on a specific query.
    rpc Range(RangeRequest) returns (RangeResponse);

    // Select represents a procedure that retrieves specific events based on a specific query.
    rpc Select(SelectRequest) returns (SelectResponse);

    // Context represents a procedure that retrieves the context associated with a specific event based on its unique identifier.
    rpc Context(ContextRequest) returns (ContextResponse);

    // GenerateBroadcastAccessUrl represents a procedure that generates a broadcast access url for a specific event based on its unique identifier.
    rpc GenerateBroadcastAccessUrl(GenerateBroadcastAccessUrlRequest) returns (GenerateBroadcastAccessUrlResponse);
}