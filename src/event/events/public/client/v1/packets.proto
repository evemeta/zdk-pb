syntax = "proto3";

package event.events.public.client.v1;

option java_multiple_files = true;
option java_package = "com.evemeta.zdk.pb.event.client.events";
option go_package = "gitlab.com/evemeta/zdk/pb/out/go/event/events/public/client/v1;eventspb";

// EnterEventPacket is a directive sent from the client to the server when the client intends to enter a specific event.
// It contains the unique identifier of the event that the client wishes to enter.
message EnterEventPacket {
    // Represents the unique identifier of the event the client is attempting to enter.
    string token = 1;
    // Represents a control mechanism that automatically disconnects any other sessions from any event linked to the user, allowing a new session to enter without issues.
    bool override = 2;
}

// LeaveEventPacket is a directive sent from the client to the server when the client intends to leave from a specific event.
// It contains the unique identifier of the event that the client wishes to leave.
message LeaveEventPacket {
    // Represents the unique identifier of the event the client is attempting to leave.
    string id = 1;
}

// InvokeEventActionPacket is a directive sent from the client to the server when the client intends to broadcast a custom action to other clients within a event.
// It contains the name of the action, which identifies what kind of action clients should recognize and process, and may include additional data as needed.
message InvokeEventActionPacket {
    // Represents the specific action's name to be recognized and handled by other clients in the event.
    string name = 1;
    // Represents additional data as key-value pairs, providing further context or parameters for the action, depending on client logic.
    map<string, string> data = 2;
}