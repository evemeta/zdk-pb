syntax = "proto3";

package event.events.private.v1;

import "event/events/private/v1/enums.proto";
import "event/members/private/v1/entities.proto";

option go_package = "github.com/evemeta/zdk-pb/out/go/event/events/private/v1;eventspb";

message Event {
    string                            id                  = 1;
    string                            key_id              = 2;
    string                            chat_id             = 3;
    string                            room_id             = 4;
    string                            user_id             = 5;
    event.events.private.v1.Kind      kind                = 6;
    event.events.private.v1.Status    status              = 7;
    event.events.private.v1.Source    source              = 8;
    int64                             capacity            = 9;
    map<string, string>               metadata            = 10;
    event.events.private.v1.Schedule  schedule            = 11;
    int64                             retention           = 12;
    int64                             planned_start_time  = 13;
    int64                             start_time          = 14;
    int64                             planned_finish_time = 15;
    int64                             finish_time         = 16;
    int64                             cancel_time         = 17;
    int64                             access_time         = 18;
    int64                             create_time         = 19;
    int64                             update_time         = 20;
}

message Source {
    oneof source {
        event.events.private.v1.McuStreamerSource mcu_streamer_source = 1;
        event.events.private.v1.McuRoomSource     mcu_room_source     = 2;
        event.events.private.v1.DashSource        dash_source         = 3;
    }
}

message McuStreamerSource {
    events.private.v1.McuSourceOrientation          orientation   = 1;
    repeated events.private.v1.McuSourceVideoOutput video_outputs = 2;
    repeated events.private.v1.McuSourceAudioOutput audio_outputs = 3;
}

message McuRoomSource {
    events.private.v1.McuSourceOrientation          orientation   = 1;
    repeated events.private.v1.McuSourceVideoOutput video_outputs = 2;
    repeated events.private.v1.McuSourceAudioOutput audio_outputs = 3;
}

message DashSource {
    string url = 1;
}

message Chunk {
    int64                                  size     = 1;
    int64                                  index    = 2;
    int64                                  total    = 3;
    repeated event.events.private.v1.Event entities = 4;
}

message Query {
    event.events.private.v1.Order              order      = 1;
    int64                                      limit      = 2;
    int64                                      offset     = 3;
    repeated event.events.private.v1.Condition conditions = 4;
}

message Condition {
    repeated string                           ids       = 1;
    repeated string                           key_ids   = 2;
    repeated string                           chat_ids  = 3;
    repeated string                           room_ids  = 4;
    repeated string                           user_ids  = 5;
    repeated event.events.private.v1.Kind     kinds     = 6;
    repeated event.events.private.v1.Status   statuses  = 7;
    repeated event.events.private.v1.Schedule schedules = 8;
    repeated event.members.private.v1.Query   members   = 9;
}

message Transient {
    event.events.private.v1.Event future   = 1;
    event.events.private.v1.Event current  = 2;
    event.events.private.v1.Event previous = 3;
}