syntax = "proto3";

package event.events.private.v1;

import "event/events/private/v1/enums.proto";
import "event/members/private/v1/entities.proto";

option go_package = "gitlab.com/evemeta/zdk/pb/out/go/event/events/private/v1;eventspb";

message Event {
    string                            id                  = 1;
    string                            chat_id             = 2;
    string                            room_id             = 3;
    event.events.private.v1.Kind      kind                = 4;
    event.events.private.v1.Status    status              = 5;
    map<string, string>               metadata            = 6;
    event.events.private.v1.Schedule  schedule            = 7;
    event.events.private.v1.Broadcast broadcast           = 8;
    int64                             planned_start_time  = 9;
    int64                             start_time          = 10;
    int64                             planned_finish_time = 11;
    int64                             finish_time         = 12;
    int64                             cancel_time         = 13;
    int64                             access_time         = 14;
    int64                             create_time         = 15;
    int64                             update_time         = 16;
}

message Broadcast {
    events.private.v1.BroadcastOrientation orientation = 1;
}

message Chunk {
    int64                                  size     = 1;
    int64                                  index    = 2;
    int64                                  total    = 3;
    repeated event.events.private.v1.Event entities = 4;
}

message Query {
    event.events.private.v1.Order              order      = 1;
    int64                                      limit      = 2;
    int64                                      offset     = 3;
    repeated event.events.private.v1.Condition conditions = 4;
}

message Condition {
    repeated string                         ids      = 1;
    repeated string                         chat_ids = 2;
    repeated string                         room_ids = 3;
    repeated event.events.private.v1.Status statuses = 4;
    repeated event.members.private.v1.Query members  = 5;
}

message Transient {
    event.events.private.v1.Event future   = 1;
    event.events.private.v1.Event current  = 2;
    event.events.private.v1.Event previous = 3;
}