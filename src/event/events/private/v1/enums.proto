syntax = "proto3";

package event.events.private.v1;

option go_package = "gitlab.com/evemeta/zdk/pb/out/go/event/events/private/v1;eventspb";

enum Kind {
    KindUnknown     = 0;
    KindDependent   = 1;
    KindIndependent = 2;
}

enum Order {
    OrderUnknown    = 0;
    OrderAscending  = 1;
    OrderDescending = 2;
}

enum Status {
    StatusUnknown     = 0;
    StatusPending     = 1;
    StatusProvisioned = 2;
    StatusStarted     = 3;
    StatusFinished    = 4;
    StatusCanceled    = 5;
}

enum Schedule {
    ScheduleUnknown   = 0;
    SchedulePlanned   = 1;
    ScheduleUnplanned = 2;
}

enum BroadcastOrientation {
    BroadcastOrientationUnknown    = 0;
    BroadcastOrientationVertical   = 1;
    BroadcastOrientationHorizontal = 2;
}