syntax = "proto3";

package event.events.private.v1;

option go_package = "github.com/evemeta/zdk-pb/out/go/event/events/private/v1;eventspb";

enum Kind {
    KindUnknown     = 0;
    KindDependent   = 1;
    KindIndependent = 2;
}

enum Order {
    OrderUnknown    = 0;
    OrderAscending  = 1;
    OrderDescending = 2;
}

enum Status {
    StatusUnknown     = 0;
    StatusPending     = 1;
    StatusProvisioned = 2;
    StatusStarted     = 3;
    StatusFinished    = 4;
    StatusCanceled    = 5;
}

enum Schedule {
    ScheduleUnknown   = 0;
    SchedulePlanned   = 1;
    ScheduleUnplanned = 2;
}

enum McuSourceOrientation {
    McuSourceOrientationUnknown    = 0;
    McuSourceOrientationVertical   = 1;
    McuSourceOrientationHorizontal = 2;
}

enum McuSourceVideoOutput {
    VideoOutputUnknown     = 0;
    VideoOutput1080p60H264 = 1;
    VideoOutput1080p30H264 = 2;
    VideoOutput720p30H264  = 3;
    VideoOutput540p30H264  = 4;
    VideoOutput360p30H264  = 5;
    VideoOutput2160p60AV1  = 6;
    VideoOutput2160p30AV   = 7;
    VideoOutput1080p30AV1  = 8;
    VideoOutput1080p60AV1  = 9;
    VideoOutput720p30AV1   = 10;
    VideoOutput540p30AV1   = 11;
    VideoOutput360p30AV1   = 12;
}

enum McuSourceAudioOutput {
    AudioOutputUnknown = 0;
    AudioOutput64kOPUS = 1;
    AudioOutput64kAAC  = 2;
}