syntax = "proto3";

package event.events.private.v1;


option go_package = "gitlab.com/evemeta/zdk/pb/out/go/event/events/private/v1;eventspb";

enum Kind {
    KindUnknown     = 0;
    KindDependent   = 1;
    KindIndependent = 2;
}

enum Order {
    OrderUnknown    = 0;
    OrderAscending  = 1;
    OrderDescending = 2;
}

enum Status {
    StatusUnknown  = 0;
    StatusStarted  = 1;
    StatusCanceled = 2;
    StatusFinished = 3;
}