syntax = "proto3";

package event.events.private.v1;

import "event/events/private/v1/enums.proto";
import "event/events/private/v1/entities.proto";
import "event/events/private/v1/optionals.proto";
import "chat/chats/private/v1/procedures.proto";
import "event/members/private/v1/procedures.proto";
import "event/restrictions/private/v1/procedures.proto";
import "gateway/transponders/private/v1/procedures.proto";

option go_package = "gitlab.com/evemeta/zdk/pb/out/go/event/events/private/v1;eventspb";

message CountArgument {
    bool                          cache = 1;
    event.events.private.v1.Query query = 2;
}

message CountRequest {
    repeated event.events.private.v1.CountArgument arguments = 1;
}

message CountResponse {
    int64 total = 1;
}

message RangeArgument {
    bool                          cache = 1;
    event.events.private.v1.Query query = 2;
}

message RangeRequest {
    repeated event.events.private.v1.RangeArgument arguments = 1;
}

message RangeResponse {
    repeated event.events.private.v1.Chunk chunks = 1;
}

message SelectArgument {
    bool                          cache = 1;
    event.events.private.v1.Query query = 2;
}

message SelectRequest {
    repeated event.events.private.v1.SelectArgument arguments = 1;
}

message SelectResponse {
    repeated event.events.private.v1.Event events = 1;
}

message InvokeArgument {
    string              id         = 1;
    string              user_id    = 2;
    string              session_id = 3;
    string              name       = 4;
    map<string, string> data       = 5;
}

message InvokeRequest {
    repeated event.events.private.v1.InvokeArgument arguments = 1;
}

message InvokeResponse {}

message CreateArgument {
    string                 id        = 1;
    events.private.v1.Kind kind      = 2;
    map<string, string>    metadata  = 3;
    int64                  retention = 4;
}

message CreateRequest {
    repeated event.events.private.v1.CreateArgument arguments = 1;
}

message CreateResponse {
    repeated event.events.private.v1.Event events = 1;
}

message CreateMutation {
    event.events.private.v1.CreateArgument     foundation      = 1;
    event.events.private.v1.CreateCondition    condition       = 2;
    repeated event.events.private.v1.Transient transient       = 3;
    int64                                      begin_timestamp = 4;
    int64                                      close_timestamp = 5;
}

message CreateCondition {
    repeated chat.chats.private.v1.CreateMutation           create_chat_mutations        = 1;
    repeated gateway.transponders.private.v1.CreateMutation create_transponder_mutations = 2;
}

message CreateTransaction {
    repeated event.events.private.v1.CreateMutation mutations = 1;
}

message UpdateArgument {
    event.events.private.v1.Query                query    = 1;
    optional event.events.private.v1.OptionalMap metadata = 2;
}

message UpdateRequest {
    repeated event.events.private.v1.UpdateArgument arguments = 1;
}

message UpdateResponse {
    repeated event.events.private.v1.Event events = 1;
}

message UpdateMutation {
    event.events.private.v1.UpdateArgument     foundation      = 1;
    repeated event.events.private.v1.Transient transient       = 2;
    int64                                      begin_timestamp = 3;
    int64                                      close_timestamp = 4;
}

message UpdateTransaction {
    repeated event.events.private.v1.UpdateMutation mutations = 1;
}

message DeleteArgument {
    event.events.private.v1.Query query = 1;
}

message DeleteRequest {
    repeated event.events.private.v1.DeleteArgument arguments = 1;
}

message DeleteResponse {
    repeated event.events.private.v1.Event events = 1;
}

message DeleteMutation {
    event.events.private.v1.DeleteArgument     foundation      = 1;
    event.events.private.v1.DeleteCondition    condition       = 2;
    repeated event.events.private.v1.Transient transient       = 3;
    int64                                      begin_timestamp = 4;
    int64                                      close_timestamp = 5;
}

message DeleteCondition {
    repeated chat.chats.private.v1.DeleteMutation           delete_chat_mutations        = 1;
    repeated event.members.private.v1.DeleteMutation        delete_member_mutations      = 2;
    repeated gateway.transponders.private.v1.DeleteMutation delete_transponder_mutations = 3;
    repeated event.restrictions.private.v1.DeleteMutation   delete_restriction_mutations = 4;
}

message DeleteTransaction {
    repeated event.events.private.v1.DeleteMutation mutations = 1;
}

message EnterArgument {
    string              id         = 1;
    string              user_id    = 2;
    string              session_id = 3;
    map<string, string> metadata   = 4;
    bool                override   = 5;
}

message EnterRequest {
    repeated event.events.private.v1.EnterArgument arguments = 1;
}

message EnterResponse {}

message EnterMutation {
    event.events.private.v1.EnterArgument  foundation      = 1;
    event.events.private.v1.EnterCondition condition       = 2;
    int64                                  begin_timestamp = 3;
    int64                                  close_timestamp = 4;
}

message EnterCondition {
    repeated event.members.private.v1.CreateMutation        create_member_mutations      = 1;
    repeated event.members.private.v1.UpdateMutation        update_member_mutations      = 2;
    repeated gateway.transponders.private.v1.CreateMutation create_transponder_mutations = 3;
}

message EnterTransaction {
    repeated event.events.private.v1.EnterMutation mutations = 1;
}

message LeaveArgument {
    string id         = 1;
    string user_id    = 2;
    string session_id = 3;
}

message LeaveRequest {
    repeated event.events.private.v1.LeaveArgument arguments = 1;
}

message LeaveResponse {}

message LeaveMutation {
    event.events.private.v1.LeaveArgument  foundation      = 1;
    event.events.private.v1.LeaveCondition condition       = 2;
    int64                                  begin_timestamp = 3;
    int64                                  close_timestamp = 4;
}

message LeaveCondition {
    repeated event.members.private.v1.UpdateMutation        update_member_mutations      = 1;
    repeated gateway.transponders.private.v1.DeleteMutation delete_transponder_mutations = 2;
}

message LeaveTransaction {
    repeated event.events.private.v1.LeaveMutation mutations = 1;
}

message StartArgument {
    event.events.private.v1.Query query = 1;
}

message StartRequest {
    repeated event.events.private.v1.StartArgument arguments = 1;
}

message StartResponse {
    repeated event.events.private.v1.Event events = 1;
}

message StartMutation {
    event.events.private.v1.StartArgument      foundation      = 1;
    repeated event.events.private.v1.Transient transient       = 2;
    int64                                      begin_timestamp = 3;
    int64                                      close_timestamp = 4;
}

message StartTransaction {
    repeated event.events.private.v1.StartMutation mutations = 1;
}

message CancelArgument {
    event.events.private.v1.Query query = 1;
}

message CancelRequest {
    repeated event.events.private.v1.CancelArgument arguments = 1;
}

message CancelResponse {
    repeated event.events.private.v1.Event events = 1;
}

message CancelMutation {
    event.events.private.v1.CancelArgument     foundation      = 1;
    repeated event.events.private.v1.Transient transient       = 2;
    int64                                      begin_timestamp = 3;
    int64                                      close_timestamp = 4;
}

message CancelTransaction {
    repeated event.events.private.v1.CancelMutation mutations = 1;
}

