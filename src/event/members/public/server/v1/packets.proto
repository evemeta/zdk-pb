syntax = "proto3";

package event.members.public.server.v1;

import "event/members/public/server/v1/entities.proto";
import "event/members/public/server/v1/optionals.proto";

option java_multiple_files = true;
option java_package = "com.evemeta.zdk.pb.event.server.members";
option go_package = "github.com/evemeta/zdk-pb/out/go/event/members/public/server/v1;memberspb";

// CreateMemberPacket is a notification sent to clients when a new member has been created.
// It provides the details of the new member and the relevant timeframe associated with the event.
message CreateMemberPacket {
    // Represents the comprehensive details of the newly created member.
    event.members.public.server.v1.Member member = 1;
    // Represents the specific span of time, containing the commence and complete timestamps associated with the event.
    event.members.public.server.v1.Timeframe timeframe = 2;
}

// UpdateMemberPacket is a notification sent to clients when a member has been updated.
// It provides the identifiers of associated user and event, updated details, and the relevant timeframe associated with the event.
message UpdateMemberPacket {
    // Represents the unique identifier of the user associated with the updated member.
    string user_id = 1;
    // Represents the unique identifier of the event in which the member was updated.
    string event_id = 2;
    // Represents a new or updated metadata associated with the member. It may be absent if no metadata changes occurred.
    optional event.members.public.server.v1.OptionalMap metadata = 3;
    // Represents the specific span of time, containing the commence and complete timestamps associated with the event.
    event.members.public.server.v1.Timeframe timeframe = 4;
}

// DeleteMemberPacket is a notification sent to clients when a member has been deleted.
// It provides the identifiers of associated user and event and the relevant timeframe associated with the event.
message DeleteMemberPacket {
    // Represents the unique identifier of the user associated with the deleted member.
    string user_id = 1;
    // Represents the unique identifier of the event in which the member was deleted.
    string event_id = 2;
    // Represents the specific span of time, containing the commence and complete timestamps associated with the event.
    event.members.public.server.v1.Timeframe timeframe = 3;
}

// KickMemberPacket is a notification sent to clients when a member has been kicked from a event.
// It provides the identifiers of associated user and event, reason for the kick, and the relevant timeframe associated with the event.
message KickMemberPacket {
    // Represents the unique identifier of the user associated with the kicked member.
    string user_id = 1;
    // Represents the unique identifier of the event from which the member was kicked.
    string event_id = 2;
    // Represents an optional reason or cause for kicking the member.
    string reason = 3;
    // Represents the specific span of time, containing the commence and complete timestamps associated with the event.
    event.members.public.server.v1.Timeframe timeframe = 4;
}