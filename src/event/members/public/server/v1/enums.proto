syntax = "proto3";

package event.members.public.server.v1;

option java_multiple_files = true;
option java_package = "com.evemeta.zdk.pb.event.server.members";
option go_package = "gitlab.com/evemeta/zdk/pb/out/go/event/members/public/server/v1;memberspb";

// Order represents an enumeration that specifies the sort order for data retrieval, particularly in the context of querying.
enum Order {
    OrderUnknown    = 0;
    OrderAscending  = 1;
    OrderDescending = 2;
}

// Status todo;
enum Status {
    StatusUnknown      = 0;
    StatusConnected    = 1;
    StatusDisconnected = 2;
}

// Permission todo;
enum Permission {
    PermissionUnknown            = 0;
    PermissionChat               = 100;
    PermissionChatBlock          = 101;
    PermissionChatUnblock        = 102;
    PermissionChatMute           = 103;
    PermissionChatUnmute         = 104;
    PermissionChatMessageDelete  = 105;
    PermissionChatKick           = 106;
    PermissionChatSlowmode       = 107;
    PermissionChatSlowmodeBypass = 108;
    PermissionEvent              = 300;
    PermissionEventBlock         = 301;
    PermissionEventUnblock       = 302;
    PermissionEventKick          = 303;
}