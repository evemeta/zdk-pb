syntax = "proto3";

import "event/members/private/v1/enums.proto";

package event.members.private.v1;

option go_package = "github.com/evemeta/zdk-pb/out/go/event/members/private/v1;memberspb";

message OptionalMap {
    map<string, string> value = 1;
}

message OptionalString {
    string value = 1;
}

message OptionalPermissions {
    repeated event.members.private.v1.Permission value = 1;
}