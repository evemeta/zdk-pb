syntax = "proto3";

package event.members.private.v1;

import "event/members/private/v1/enums.proto";

option go_package = "github.com/evemeta/zdk-pb/out/go/event/members/private/v1;memberspb";

message Chunk {
    int64                                    size     = 1;
    int64                                    index    = 2;
    int64                                    total    = 3;
    repeated event.members.private.v1.Member entities = 4;
}

message Query {
    event.members.private.v1.Order              order      = 1;
    int64                                       limit      = 2;
    int64                                       offset     = 3;
    repeated event.members.private.v1.Condition conditions = 4;
}

message Member {
    string                                       id          = 1;
    string                                       user_id     = 2;
    string                                       event_id    = 3;
    event.members.private.v1.Status              status      = 4;
    map<string, string>                          metadata    = 5;
    repeated event.members.private.v1.Permission permissions = 6;
    int64                                        enter_time  = 7;
    int64                                        leave_time  = 8;
    int64                                        access_time = 9;
    int64                                        create_time = 10;
    int64                                        update_time = 11;
}

message Condition {
    repeated string                          ids       = 1;
    repeated string                          user_ids  = 2;
    repeated string                          event_ids = 3;
    repeated event.members.private.v1.Status statuses  = 4;
}

message Transient {
    event.members.private.v1.Member future   = 1;
    event.members.private.v1.Member current  = 2;
    event.members.private.v1.Member previous = 3;
}