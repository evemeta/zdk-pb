syntax = "proto3";

package event.members.private.v1;

import "event/members/private/v1/enums.proto";
import "event/members/private/v1/entities.proto";
import "event/members/private/v1/optionals.proto";
import "chat/members/private/v1/procedures.proto";
import "gateway/transponders/private/v1/procedures.proto";

option go_package = "github.com/evemeta/zdk-pb/out/go/event/members/private/v1;memberspb";

message CountArgument {
    bool                           cache = 1;
    event.members.private.v1.Query query = 2;
}

message CountRequest {
    repeated event.members.private.v1.CountArgument arguments = 1;
}

message CountResponse {
    int64 total = 1;
}

message RangeArgument {
    bool                           cache = 1;
    event.members.private.v1.Query query = 2;
}

message RangeRequest {
    repeated event.members.private.v1.RangeArgument arguments = 1;
}

message RangeResponse {
    repeated event.members.private.v1.Chunk chunks = 1;
}

message SelectArgument {
    bool                           cache = 1;
    event.members.private.v1.Query query = 2;
}

message SelectRequest {
    repeated event.members.private.v1.SelectArgument arguments = 1;
}

message SelectResponse {
    repeated event.members.private.v1.Member members = 1;
}

message CreateArgument {
    string                                       id          = 1;
    string                                       user_id     = 2;
    string                                       event_id    = 3;
    event.members.private.v1.Status              status      = 4;
    map<string, string>                          metadata    = 5;
    repeated event.members.private.v1.Permission permissions = 6;
    int64                                        enter_time  = 7;
    int64                                        leave_time  = 8;
}

message CreateRequest {
    repeated event.members.private.v1.CreateArgument arguments = 1;
}

message CreateResponse {
    repeated event.members.private.v1.Member members = 1;
}

message CreateMutation {
    event.members.private.v1.CreateArgument     foundation      = 1;
    event.members.private.v1.CreateCondition    condition       = 2;
    repeated event.members.private.v1.Transient transient       = 3;
    int64                                       begin_timestamp = 4;
    int64                                       close_timestamp = 5;
}

message CreateCondition {
    repeated gateway.transponders.private.v1.CreateMutation create_transponder_mutations = 1;
}

message CreateTransaction {
    repeated event.members.private.v1.CreateMutation mutations = 1;
}

message UpdateArgument {
    event.members.private.v1.Query                        query       = 1;
    optional event.members.private.v1.OptionalString      user_id     = 2;
    optional event.members.private.v1.OptionalString      event_id    = 3;
    optional event.members.private.v1.OptionalMap         metadata    = 4;
    optional event.members.private.v1.OptionalPermissions permissions = 5;
}

message UpdateRequest {
    repeated event.members.private.v1.UpdateArgument arguments = 1;
}

message UpdateResponse {
    repeated event.members.private.v1.Member members = 1;
}

message UpdateMutation {
    event.members.private.v1.UpdateArgument     foundation      = 1;
    repeated event.members.private.v1.Transient transient       = 2;
    int64                                       begin_timestamp = 3;
    int64                                       close_timestamp = 4;
}

message UpdateTransaction {
    repeated event.members.private.v1.UpdateMutation mutations = 1;
}

message DeleteArgument {
    event.members.private.v1.Query query = 1;
}

message DeleteRequest {
    repeated event.members.private.v1.DeleteArgument arguments = 1;
}

message DeleteResponse {
    repeated event.members.private.v1.Member members = 1;
}

message DeleteMutation {
    event.members.private.v1.DeleteArgument     foundation      = 1;
    event.members.private.v1.DeleteCondition    condition       = 2;
    repeated event.members.private.v1.Transient transient       = 3;
    int64                                       begin_timestamp = 4;
    int64                                       close_timestamp = 5;
}

message DeleteCondition {
    repeated event.members.private.v1.KickMutation          kick_mutations               = 1;
    repeated gateway.transponders.private.v1.DeleteMutation delete_transponder_mutations = 2;
}

message DeleteTransaction {
    repeated event.members.private.v1.DeleteMutation mutations = 1;
}

message KickArgument {
    event.members.private.v1.Query query  = 1;
    string                         reason = 2;
}

message KickRequest {
    repeated event.members.private.v1.KickArgument arguments = 1;
}

message KickResponse {}

message KickMutation {
    event.members.private.v1.KickArgument  foundation      = 1;
    event.members.private.v1.KickCondition condition       = 2;
    int64                                  begin_timestamp = 3;
    int64                                  close_timestamp = 4;
}

message KickCondition {
    repeated event.members.private.v1.UpdateMutation        update_mutations             = 1;
    repeated chat.members.private.v1.KickMutation           kick_chat_member_mutations   = 2;
    repeated gateway.transponders.private.v1.DeleteMutation delete_transponder_mutations = 3;
}

message KickTransaction {
    repeated event.members.private.v1.KickMutation mutations = 1;
}