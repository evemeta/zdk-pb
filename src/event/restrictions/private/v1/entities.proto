syntax = "proto3";

package event.restrictions.private.v1;

import "event/restrictions/private/v1/enums.proto";

option go_package = "gitlab.com/evemeta/zdk/pb/out/go/event/restrictions/private/v1;restrictionspb";

message Chunk {
    int64                                              size     = 1;
    int64                                              index    = 2;
    int64                                              total    = 3;
    repeated event.restrictions.private.v1.Restriction entities = 4;
}

message Query {
    event.restrictions.private.v1.Order              order      = 1;
    int64                                            limit      = 2;
    int64                                            offset     = 3;
    repeated event.restrictions.private.v1.Condition conditions = 4;
}

message Restriction {
    string                             id           = 1;
    string                             user_id      = 2;
    string                             event_id     = 3;
    event.restrictions.private.v1.Kind kind         = 4;
    string                             reason       = 5;
    int64                              access_time  = 6;
    int64                              create_time  = 7;
    int64                              expire_time  = 8;
}

message Condition {
    repeated string                             ids       = 1;
    repeated string                             user_ids  = 2;
    repeated string                             event_ids = 3;
    repeated event.restrictions.private.v1.Kind kinds     = 4;
}

message Transient {
    event.restrictions.private.v1.Restriction future   = 1;
    event.restrictions.private.v1.Restriction current  = 2;
    event.restrictions.private.v1.Restriction previous = 3;
}