syntax = "proto3";

package nsfw.private.v1;


option go_package = "github.com/evemeta/zdk-pb/out/go/nsfw/private/v1;nsfwpb";

enum ImageType {
    ImageTypeUnknown     = 0;
    ImageTypeH264        = 1;
    ImageTypeH265        = 2;
    ImageTypeVP8         = 3;
    ImageTypeVP9         = 4;
    ImageTypeAV1         = 5;
    ImageTypeAVIF        = 6;
    ImageTypeJPG         = 7;
    ImageTypeWEBP        = 8;
    ImageTypePNG         = 9;
}