syntax = "proto3";

package gateway.jobs.private.v1;

import "gateway/jobs/private/v1/enums.proto";
import "gateway/jobs/private/v1/entities.proto";

option go_package = "gitlab.com/evemeta/zdk/pb/out/go/gateway/jobs/private/v1;jobspb";

message OptionalResult {
    gateway.jobs.private.v1.Result value = 1;
}

message OptionalStatus {
    gateway.jobs.private.v1.Status value = 1;
}

message OptionalString {
    string value = 1;
}

message OptionalMetadata {
    map<string, string> value = 1;
}