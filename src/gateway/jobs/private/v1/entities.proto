syntax = "proto3";

package gateway.jobs.private.v1;

import "gateway/jobs/private/v1/enums.proto";
import "common/orders/public/v1/entities.proto";

option go_package = "gitlab.com/evemeta/zdk/pb/out/go/gateway/jobs/private/v1;jobspb";

message Chunk {
    int64                                size     = 1;
    int64                                index    = 2;
    int64                                total    = 3;
    repeated gateway.jobs.private.v1.Job entities = 4;
}

message Query {
    common.orders.public.v1.Order              order      = 1;
    int64                                      limit      = 2;
    int64                                      offset     = 3;
    repeated gateway.jobs.private.v1.Condition conditions = 4;
}

message Condition {
    repeated string                         ids       = 1;
    repeated gateway.jobs.private.v1.Status statuses  = 2;
    repeated string                         templates = 3;
}

message Transient {
    gateway.jobs.private.v1.Job future   = 1;
    gateway.jobs.private.v1.Job current  = 2;
    gateway.jobs.private.v1.Job previous = 3;
}

message Job {
    string                            id          = 1;
    gateway.jobs.private.v1.Result    result      = 2;
    gateway.jobs.private.v1.Status    status      = 3;
    map<string, string>               metadata    = 4;
    string                            template    = 5;
    gateway.jobs.private.v1.Container container   = 6;
    int64                             access_time = 7;
    int64                             create_time = 8;
    int64                             update_time = 9;
}

message Result {
    string description = 1;
    int64  create_time = 2;
}

message Container {
    repeated string     arguments   = 1;
    map<string, string> variables   = 2;
    map<string, string> annotations = 3;
}