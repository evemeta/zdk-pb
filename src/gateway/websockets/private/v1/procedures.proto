syntax = "proto3";

package gateway.websockets.private.v1;

import "gateway/websockets/private/v1/enums.proto";
import "gateway/websockets/private/v1/entities.proto";
import "gateway/websockets/private/v1/optionals.proto";
import "gateway/sessions/private/v1/entities.proto";
import "gateway/sessions/private/v1/procedures.proto";
import "common/messages/public/v1/entities.proto";

option go_package = "github.com/evemeta/zdk-pb/out/go/gateway/websockets/private/v1;websocketspb";

message CountArgument {
    bool                                cache = 1;
    gateway.websockets.private.v1.Query query = 2;
}

message CountRequest {
    repeated gateway.websockets.private.v1.CountArgument arguments = 1;
}

message CountResponse {
    int64 total = 1;
}

message RangeArgument {
    bool                                cache = 1;
    gateway.websockets.private.v1.Query query = 2;
}

message RangeRequest {
    repeated gateway.websockets.private.v1.RangeArgument arguments = 1;
}

message RangeResponse {
    repeated gateway.websockets.private.v1.Chunk chunks = 1;
}

message SelectArgument {
    bool                                cache = 1;
    gateway.websockets.private.v1.Query query = 2;
}

message SelectRequest {
    repeated gateway.websockets.private.v1.SelectArgument arguments = 1;
}

message SelectResponse {
    repeated gateway.websockets.private.v1.Websocket websockets = 1;
}

message CreateArgument {
    string                               id      = 1;
    gateway.websockets.private.v1.Zone   zone    = 2;
    gateway.websockets.private.v1.Status status  = 3;
    string                               address = 4;
}

message CreateRequest {
    repeated gateway.websockets.private.v1.CreateArgument arguments = 1;
}

message CreateResponse {
    repeated gateway.websockets.private.v1.Websocket websockets = 1;
}

message CreateMutation {
    gateway.websockets.private.v1.CreateArgument     foundation      = 1;
    repeated gateway.websockets.private.v1.Transient transient       = 2;
    int64                                            begin_timestamp = 3;
    int64                                            close_timestamp = 4;
}

message CreateTransaction {
    repeated gateway.websockets.private.v1.CreateMutation mutations = 1;
}

message UpdateArgument {
    gateway.websockets.private.v1.Query                   query   = 1;
    optional gateway.websockets.private.v1.OptionalZone   zone    = 2;
    optional gateway.websockets.private.v1.OptionalStatus status  = 3;
    optional gateway.websockets.private.v1.OptionalString address = 4;
}

message UpdateRequest {
    repeated gateway.websockets.private.v1.UpdateArgument arguments = 1;
}

message UpdateResponse {
    repeated gateway.websockets.private.v1.Websocket websockets = 1;
}

message UpdateMutation {
    gateway.websockets.private.v1.UpdateArgument     foundation      = 1;
    repeated gateway.websockets.private.v1.Transient transient       = 2;
    int64                                            begin_timestamp = 3;
    int64                                            close_timestamp = 4;
}

message UpdateTransaction {
    repeated gateway.websockets.private.v1.UpdateMutation mutations = 1;
}

message DeleteArgument {
    gateway.websockets.private.v1.Query query = 1;
}

message DeleteRequest {
    repeated gateway.websockets.private.v1.DeleteArgument arguments = 1;
}

message DeleteResponse {
    repeated gateway.websockets.private.v1.Websocket websockets = 1;
}

message DeleteMutation {
    gateway.websockets.private.v1.DeleteArgument     foundation      = 1;
    gateway.websockets.private.v1.DeleteCondition    condition       = 2;
    repeated gateway.websockets.private.v1.Transient transient       = 3;
    int64                                            begin_timestamp = 4;
    int64                                            close_timestamp = 5;
}

message DeleteCondition {
    repeated gateway.sessions.private.v1.DeleteMutation delete_session_mutations = 1;
}

message DeleteTransaction {
    repeated gateway.websockets.private.v1.DeleteMutation mutations = 1;
}

message BroadcastArgument {
    common.messages.public.v1.Message message  = 1;
    repeated string                   subjects = 2;
}

message BroadcastRequest {
    repeated gateway.websockets.private.v1.BroadcastArgument arguments = 1;
}

message BroadcastResponse {}

message BroadcastMutation {
    gateway.websockets.private.v1.BroadcastArgument  foundation      = 1;
    gateway.websockets.private.v1.BroadcastCondition condition       = 2;
    int64                                            begin_timestamp = 3;
    int64                                            close_timestamp = 4;
}

message BroadcastCondition {
    repeated gateway.websockets.private.v1.BroadcastDestination destinations = 1;
}

message BroadcastDestination {
    gateway.websockets.private.v1.Websocket websocket = 1;
    repeated string                         subjects  = 2;
}

message BroadcastTransaction {
    repeated gateway.websockets.private.v1.BroadcastMutation mutations = 1;
}

message DisconnectArgument {
    gateway.sessions.private.v1.Query query = 1;
}

message DisconnectRequest {
    repeated gateway.websockets.private.v1.DisconnectArgument arguments = 1;
}

message DisconnectResponse {}

message DisconnectMutation {
    gateway.websockets.private.v1.DisconnectArgument  foundation      = 1;
    gateway.websockets.private.v1.DisconnectCondition condition       = 2;
    int64                                             begin_timestamp = 3;
    int64                                             close_timestamp = 4;
}

message DisconnectCondition {
    repeated gateway.sessions.private.v1.Session     sessions   = 1;
    repeated gateway.websockets.private.v1.Websocket websockets = 2;
}

message DisconnectTransaction {
    repeated gateway.websockets.private.v1.DisconnectMutation mutations = 1;
}