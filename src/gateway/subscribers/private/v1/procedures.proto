syntax = "proto3";

package gateway.subscribers.private.v1;


option go_package = "github.com/evemeta/zdk-pb/out/go/gateway/subscribers/private/v1;subscriberspb";

message SelectArgument {
    repeated string subjects = 1;
}

message SelectRequest {
    repeated gateway.subscribers.private.v1.SelectArgument arguments = 1;
}

message SelectResponse {
    repeated string subjects = 1;
}