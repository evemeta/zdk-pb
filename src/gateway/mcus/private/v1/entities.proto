syntax = "proto3";

package gateway.mcus.private.v1;

import "gateway/mcus/private/v1/enums.proto";
import "common/orders/public/v1/entities.proto";

option go_package = "github.com/evemeta/zdk-pb/out/go/gateway/mcus/private/v1;mcuspb";

message Chunk {
    int64                                size     = 1;
    int64                                index    = 2;
    int64                                total    = 3;
    repeated gateway.mcus.private.v1.Mcu entities = 4;
}

message Query {
    common.orders.public.v1.Order              order      = 1;
    int64                                      limit      = 2;
    int64                                      offset     = 3;
    repeated gateway.mcus.private.v1.Condition conditions = 4;
}

message Condition {
    repeated string                         ids       = 1;
    repeated string                         job_ids   = 2;
    repeated string                         room_ids  = 3;
    repeated string                         nodes     = 4;
    repeated gateway.mcus.private.v1.Status statuses  = 5;
    repeated string                         addresses = 6;
}

message Transient {
    gateway.mcus.private.v1.Mcu future   = 1;
    gateway.mcus.private.v1.Mcu current  = 2;
    gateway.mcus.private.v1.Mcu previous = 3;
}

message Mcu {
    string                         id          = 1;
    string                         job_id      = 2;
    string                         room_id     = 3;
    string                         node        = 4;
    gateway.mcus.private.v1.Status status      = 5;
    string                         address     = 6;
    int64                          access_time = 7;
    int64                          create_time = 8;
    int64                          update_time = 9;
}
