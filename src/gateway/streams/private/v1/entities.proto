syntax = "proto3";

package gateway.streams.private.v1;

import "gateway/streams/private/v1/enums.proto";
import "common/orders/public/v1/entities.proto";

option go_package = "github.com/evemeta/zdk-pb/out/go/gateway/streams/private/v1;streamspb";

message Chunk {
    int64                                              size     = 1;
    int64                                              index    = 2;
    int64                                              total    = 3;
    repeated gateway.streams.private.v1.Stream         entities = 4;
}

message Query {
    common.orders.public.v1.Order                     order      = 1;
    int64                                             limit      = 2;
    int64                                             offset     = 3;
    repeated gateway.streams.private.v1.Condition     conditions = 4;
}

message Condition {
    repeated string                                ids          = 1;
    repeated string                                streamer_ids = 2;
    repeated string                                source_ids   = 3;
    repeated string                                room_ids     = 4;
    repeated gateway.streams.private.v1.Status     statuses     = 5;
}

message Transient {
    gateway.streams.private.v1.Stream future   = 1;
    gateway.streams.private.v1.Stream current  = 2;
    gateway.streams.private.v1.Stream previous = 3;
}

message Stream {
    string                                id          = 1;
    string                                streamer_id = 2;
    string                                source_id   = 3;
    string                                room_id     = 4;
    gateway.streams.private.v1.Status     status      = 5;
    int64                                 access_time = 6;
    int64                                 create_time = 7;
    int64                                 update_time = 8;
}
