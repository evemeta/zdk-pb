syntax = "proto3";

package gateway.streams.private.v1;

import "gateway/streams/private/v1/enums.proto";
import "gateway/streams/private/v1/entities.proto";
import "gateway/streams/private/v1/optionals.proto";

option go_package = "github.com/evemeta/zdk-pb/out/go/gateway/streams/private/v1;streamspb";

message CountArgument {
    bool                                 cache = 1;
    gateway.streams.private.v1.Query     query = 2;
}

message CountRequest {
    repeated gateway.streams.private.v1.CountArgument arguments = 1;
}

message CountResponse {
    int64 total = 1;
}

message RangeArgument {
    bool                             cache = 1;
    gateway.streams.private.v1.Query query = 2;
}

message RangeRequest {
    repeated gateway.streams.private.v1.RangeArgument arguments = 1;
}

message RangeResponse {
    repeated gateway.streams.private.v1.Chunk chunks = 1;
}

message SelectArgument {
    bool                             cache = 1;
    gateway.streams.private.v1.Query query = 2;
}

message SelectRequest {
    repeated gateway.streams.private.v1.SelectArgument arguments = 1;
}

message SelectResponse {
    repeated gateway.streams.private.v1.Stream streams = 1;
}

message CreateArgument {
    string                            id          = 1;
    string                            streamer_id = 2;
    string                            source_id   = 3;
    string                            room_id     = 4;
    gateway.streams.private.v1.Status status      = 5;
}

message CreateRequest {
    repeated gateway.streams.private.v1.CreateArgument arguments = 1;
}

message CreateResponse {
    repeated gateway.streams.private.v1.Stream streams = 1;
}

message CreateMutation {
    gateway.streams.private.v1.CreateArgument     foundation      = 1;
    repeated gateway.streams.private.v1.Transient transient       = 2;
    int64                                         begin_timestamp = 3;
    int64                                         close_timestamp = 4;
}

message CreateTransaction {
    repeated gateway.streams.private.v1.CreateMutation mutations = 1;
}

message UpdateArgument {
    gateway.streams.private.v1.Query                   query       = 1;
    optional gateway.streams.private.v1.OptionalString streamer_id = 2;
    optional gateway.streams.private.v1.OptionalString source_id   = 3;
    optional gateway.streams.private.v1.OptionalString room_id     = 4;
    optional gateway.streams.private.v1.OptionalStatus status      = 5;
}

message UpdateRequest {
    repeated gateway.streams.private.v1.UpdateArgument arguments = 1;
}

message UpdateResponse {
    repeated gateway.streams.private.v1.Stream streams = 1;
}

message UpdateMutation {
    gateway.streams.private.v1.UpdateArgument     foundation      = 1;
    repeated gateway.streams.private.v1.Transient transient       = 2;
    int64                                         begin_timestamp = 3;
    int64                                         close_timestamp = 4;
}

message UpdateTransaction {
    repeated gateway.streams.private.v1.UpdateMutation mutations = 1;
}

message DeleteArgument {
    gateway.streams.private.v1.Query query = 1;
}

message DeleteRequest {
    repeated gateway.streams.private.v1.DeleteArgument arguments = 1;
}

message DeleteResponse {
    repeated gateway.streams.private.v1.Stream streams = 1;
}

message DeleteMutation {
    gateway.streams.private.v1.DeleteArgument     foundation      = 1;
    repeated gateway.streams.private.v1.Transient transient       = 2;
    int64                                         begin_timestamp = 3;
    int64                                         close_timestamp = 4;
}

message DeleteTransaction {
    repeated gateway.streams.private.v1.DeleteMutation mutations = 1;
}