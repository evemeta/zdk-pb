syntax = "proto3";

package gateway.connections.private.v1;

import "gateway/connections/private/v1/enums.proto";
import "gateway/connections/private/v1/entities.proto";
import "gateway/connections/private/v1/optionals.proto";
import "room/connections/private/v1/procedures.proto";
import "gateway/transponders/private/v1/procedures.proto";

option go_package = "github.com/evemeta/zdk-pb/out/go/gateway/connections/private/v1;connectionspb";

message CountArgument {
    bool                                 cache = 1;
    gateway.connections.private.v1.Query query = 2;
}

message CountRequest {
    repeated gateway.connections.private.v1.CountArgument arguments = 1;
}

message CountResponse {
    int64 total = 1;
}

message RangeArgument {
    bool                                 cache = 1;
    gateway.connections.private.v1.Query query = 2;
}

message RangeRequest {
    repeated gateway.connections.private.v1.RangeArgument arguments = 1;
}

message RangeResponse {
    repeated gateway.connections.private.v1.Chunk chunks = 1;
}

message SelectArgument {
    bool                                 cache = 1;
    gateway.connections.private.v1.Query query = 2;
}

message SelectRequest {
    repeated gateway.connections.private.v1.SelectArgument arguments = 1;
}

message SelectResponse {
    repeated gateway.connections.private.v1.Connection connections = 1;
}

message CreateArgument {
    string                                id         = 1;
    string                                sfu_id     = 2;
    string                                user_id    = 3;
    string                                room_id    = 4;
    string                                session_id = 5;
    gateway.connections.private.v1.Kind   kind       = 6;
    gateway.connections.private.v1.Status status     = 7;
}

message CreateRequest {
    repeated gateway.connections.private.v1.CreateArgument arguments = 1;
}

message CreateResponse {
    repeated gateway.connections.private.v1.Connection connections = 1;
}

message CreateMutation {
    gateway.connections.private.v1.CreateArgument     foundation      = 1;
    gateway.connections.private.v1.CreateCondition    condition       = 2;
    repeated gateway.connections.private.v1.Transient transient       = 3;
    int64                                             begin_timestamp = 4;
    int64                                             close_timestamp = 5;
}

message CreateCondition {
    repeated room.connections.private.v1.CreateMutation create_connection_mutations = 1;
}

message CreateTransaction {
    repeated gateway.connections.private.v1.CreateMutation mutations = 1;
}

message UpdateArgument {
    gateway.connections.private.v1.Query                   query      = 1;
    optional gateway.connections.private.v1.OptionalString sfu_id     = 2;
    optional gateway.connections.private.v1.OptionalString user_id    = 3;
    optional gateway.connections.private.v1.OptionalString room_id    = 4;
    optional gateway.connections.private.v1.OptionalString session_id = 5;
    optional gateway.connections.private.v1.OptionalStatus status     = 6;
}

message UpdateRequest {
    repeated gateway.connections.private.v1.UpdateArgument arguments = 1;
}

message UpdateResponse {
    repeated gateway.connections.private.v1.Connection connections = 1;
}

message UpdateMutation {
    gateway.connections.private.v1.UpdateArgument     foundation      = 1;
    gateway.connections.private.v1.UpdateCondition    condition       = 2;
    repeated gateway.connections.private.v1.Transient transient       = 3;
    int64                                             begin_timestamp = 4;
    int64                                             close_timestamp = 5;
}

message UpdateCondition {
    repeated room.connections.private.v1.UpdateMutation update_connection_mutations = 1;
}

message UpdateTransaction {
    repeated gateway.connections.private.v1.UpdateMutation mutations = 1;
}

message DeleteArgument {
    gateway.connections.private.v1.Query query = 1;
}

message DeleteRequest {
    repeated gateway.connections.private.v1.DeleteArgument arguments = 1;
}

message DeleteResponse {
    repeated gateway.connections.private.v1.Connection connections = 1;
}

message DeleteMutation {
    gateway.connections.private.v1.DeleteArgument     foundation      = 1;
    gateway.connections.private.v1.DeleteCondition    condition       = 2;
    repeated gateway.connections.private.v1.Transient transient       = 3;
    int64                                             begin_timestamp = 4;
    int64                                             close_timestamp = 5;
}

message DeleteCondition {
    repeated room.connections.private.v1.DeleteMutation delete_connection_mutations = 1;
    repeated gateway.transponders.private.v1.DeleteMutation delete_transponder_mutations = 2;
}

message DeleteTransaction {
    repeated gateway.connections.private.v1.DeleteMutation mutations = 1;
}