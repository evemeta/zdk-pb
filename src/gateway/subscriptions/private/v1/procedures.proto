syntax = "proto3";

package gateway.subscriptions.private.v1;


option go_package = "github.com/evemeta/zdk-pb/out/go/gateway/subscriptions/private/v1;subscriptionspb";

message SelectArgument {
    repeated string subjects = 1;
}

message SelectRequest {
    repeated gateway.subscriptions.private.v1.SelectArgument arguments = 1;
}

message SelectResponse {
    repeated string subjects = 1;
}

message EnsureArgument {
    string          subject = 1;
    repeated string targets = 2;
}

message EnsureRequest {
    repeated gateway.subscriptions.private.v1.EnsureArgument arguments = 1;
}

message EnsureResponse {
    bool result = 1;
}