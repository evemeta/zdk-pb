syntax = "proto3";

package gateway.sessions.private.v1;

import "gateway/sessions/private/v1/entities.proto";
import "gateway/sessions/private/v1/optionals.proto";
import "common/timeframes/public/v1/entities.proto";

option go_package = "github.com/evemeta/zdk-pb/out/go/gateway/sessions/private/v1;sessionspb";

message CreateSessionPacket {
    gateway.sessions.private.v1.Session   session   = 1;
    common.timeframes.public.v1.Timeframe timeframe = 2;
}

message UpdateSessionPacket {
    string                                              id           = 1;
    string                                              websocket_id = 2;
    optional gateway.sessions.private.v1.OptionalStatus status       = 3;
    common.timeframes.public.v1.Timeframe               timeframe    = 4;
}

message DeleteSessionPacket {
    string                                id           = 1;
    string                                websocket_id = 2;
    common.timeframes.public.v1.Timeframe timeframe    = 3;
}

message AttachSessionPacket {
    string                                id           = 1;
    string                                websocket_id = 2;
    common.timeframes.public.v1.Timeframe timeframe    = 3;
}

message DetachSessionPacket {
    string                                id           = 1;
    string                                websocket_id = 2;
    common.timeframes.public.v1.Timeframe timeframe    = 3;
}

message CloseSessionPacket {
    string                                id           = 1;
    string                                user_id      = 2;
    string                                websocket_id = 3;
    common.timeframes.public.v1.Timeframe timeframe    = 4;
}