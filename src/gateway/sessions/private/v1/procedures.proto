syntax = "proto3";

package gateway.sessions.private.v1;

import "gateway/sfus/private/v1/procedures.proto";
import "chat/members/private/v1/procedures.proto";
import "room/members/private/v1/procedures.proto";
import "event/members/private/v1/procedures.proto";
import "gateway/sessions/private/v1/enums.proto";
import "gateway/sessions/private/v1/entities.proto";
import "gateway/sessions/private/v1/optionals.proto";
import "gateway/connections/private/v1/procedures.proto";
import "gateway/transponders/private/v1/procedures.proto";

option go_package = "github.com/evemeta/zdk-pb/out/go/gateway/sessions/private/v1;sessionspb";

message CountArgument {
    bool                              cache = 1;
    gateway.sessions.private.v1.Query query = 2;
}

message CountRequest {
    repeated gateway.sessions.private.v1.CountArgument arguments = 1;
}

message CountResponse {
    int64 total = 1;
}

message RangeArgument {
    bool                              cache = 1;
    gateway.sessions.private.v1.Query query = 2;
}

message RangeRequest {
    repeated gateway.sessions.private.v1.RangeArgument arguments = 1;
}

message RangeResponse {
    repeated gateway.sessions.private.v1.Chunk chunks = 1;
}

message SelectArgument {
    bool                              cache = 1;
    gateway.sessions.private.v1.Query query = 2;
}

message SelectRequest {
    repeated gateway.sessions.private.v1.SelectArgument arguments = 1;
}

message SelectResponse {
    repeated gateway.sessions.private.v1.Session sessions = 1;
}

message CreateArgument {
    string                             id           = 1;
    string                             user_id      = 2;
    string                             websocket_id = 3;
    gateway.sessions.private.v1.Status status       = 4;
}

message CreateRequest {
    repeated gateway.sessions.private.v1.CreateArgument arguments = 1;
}

message CreateResponse {
    repeated gateway.sessions.private.v1.Session sessions = 1;
}

message CreateMutation {
    gateway.sessions.private.v1.CreateArgument     foundation      = 1;
    gateway.sessions.private.v1.CreateCondition    condition       = 2;
    repeated gateway.sessions.private.v1.Transient transient       = 3;
    int64                                          begin_timestamp = 4;
    int64                                          close_timestamp = 5;
}

message CreateCondition {
    repeated gateway.transponders.private.v1.CreateMutation create_transponder_mutations = 1;
}

message CreateTransaction {
    repeated gateway.sessions.private.v1.CreateMutation mutations = 1;
}

message UpdateArgument {
    gateway.sessions.private.v1.Query                   query        = 1;
    optional gateway.sessions.private.v1.OptionalString user_id      = 2;
    optional gateway.sessions.private.v1.OptionalString websocket_id = 3;
    optional gateway.sessions.private.v1.OptionalStatus status       = 4;
}

message UpdateRequest {
    repeated gateway.sessions.private.v1.UpdateArgument arguments = 1;
}

message UpdateResponse {
    repeated gateway.sessions.private.v1.Session sessions = 1;
}

message UpdateMutation {
    gateway.sessions.private.v1.UpdateArgument     foundation      = 1;
    repeated gateway.sessions.private.v1.Transient transient       = 2;
    int64                                          begin_timestamp = 3;
    int64                                          close_timestamp = 4;
}

message UpdateTransaction {
    repeated gateway.sessions.private.v1.UpdateMutation mutations = 1;
}

message DeleteArgument {
    gateway.sessions.private.v1.Query query = 1;
}

message DeleteRequest {
    repeated gateway.sessions.private.v1.DeleteArgument arguments = 1;
}

message DeleteResponse {
    repeated gateway.sessions.private.v1.Session sessions = 1;
}

message DeleteMutation {
    gateway.sessions.private.v1.DeleteArgument     foundation      = 1;
    gateway.sessions.private.v1.DeleteCondition    condition       = 2;
    repeated gateway.sessions.private.v1.Transient transient       = 3;
    int64                                          begin_timestamp = 4;
    int64                                          close_timestamp = 5;
}

message DeleteCondition {
    repeated chat.members.private.v1.KickMutation           kick_chat_member_mutations      = 1;
    repeated room.members.private.v1.KickMutation           kick_room_member_mutations      = 2;
    repeated event.members.private.v1.KickMutation          kick_event_member_mutations     = 6;
    repeated gateway.connections.private.v1.DeleteMutation  delete_connection_mutations     = 3;
    repeated gateway.transponders.private.v1.DeleteMutation delete_transponder_mutations    = 4;
    repeated gateway.sfus.private.v1.DisconnectMutation     disconnect_connection_mutations = 5;
}

message DeleteTransaction {
    repeated gateway.sessions.private.v1.DeleteMutation mutations = 1;
}

message AttachArgument {
    string id           = 1;
    string user_id      = 2;
    string websocket_id = 3;
}

message AttachRequest {
    repeated gateway.sessions.private.v1.AttachArgument arguments = 1;
}

message AttachResponse {
    repeated string subjects = 1;
}

message AttachMutation {
    gateway.sessions.private.v1.AttachArgument  foundation      = 1;
    gateway.sessions.private.v1.AttachCondition condition       = 2;
    repeated string                             transient       = 3;
    int64                                       begin_timestamp = 4;
    int64                                       close_timestamp = 5;
}

message AttachCondition {
    repeated gateway.sessions.private.v1.CreateMutation create_mutations = 1;
    repeated gateway.sessions.private.v1.UpdateMutation update_mutations = 2;
}

message AttachTransaction {
    repeated gateway.sessions.private.v1.AttachMutation mutations = 1;
}

message DetachArgument {
    string id        = 1;
    bool   conscious = 2;
}

message DetachRequest {
    repeated gateway.sessions.private.v1.DetachArgument arguments = 1;
}

message DetachResponse {}

message DetachMutation {
    gateway.sessions.private.v1.DetachArgument  foundation      = 1;
    gateway.sessions.private.v1.DetachCondition condition       = 2;
    int64                                       begin_timestamp = 3;
    int64                                       close_timestamp = 4;
}

message DetachCondition {
    repeated gateway.sessions.private.v1.UpdateMutation update_mutations = 1;
    repeated gateway.sessions.private.v1.DeleteMutation delete_mutations = 2;
}

message DetachTransaction {
    repeated gateway.sessions.private.v1.DetachMutation mutations = 1;
}