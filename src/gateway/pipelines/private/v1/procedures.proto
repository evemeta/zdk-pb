syntax = "proto3";

package gateway.pipelines.private.v1;

import "gateway/pipelines/private/v1/enums.proto";
import "gateway/pipelines/private/v1/entities.proto";
import "gateway/pipelines/private/v1/optionals.proto";

option go_package = "github.com/evemeta/zdk-pb/out/go/gateway/pipelines/private/v1;pipelinespb";

message CountArgument {
    bool                                 cache = 1;
    gateway.pipelines.private.v1.Query query = 2;
}

message CountRequest {
    repeated gateway.pipelines.private.v1.CountArgument arguments = 1;
}

message CountResponse {
    int64 total = 1;
}

message RangeArgument {
    bool                                 cache = 1;
    gateway.pipelines.private.v1.Query query = 2;
}

message RangeRequest {
    repeated gateway.pipelines.private.v1.RangeArgument arguments = 1;
}

message RangeResponse {
    repeated gateway.pipelines.private.v1.Chunk chunks = 1;
}

message SelectArgument {
    bool                                 cache = 1;
    gateway.pipelines.private.v1.Query query = 2;
}

message SelectRequest {
    repeated gateway.pipelines.private.v1.SelectArgument arguments = 1;
}

message SelectResponse {
    repeated gateway.pipelines.private.v1.Pipeline pipelines = 1;
}

message CreateArgument {
    string                                id         = 1;
    string                                sfu_id     = 2;
    string                                user_id    = 3;
    string                                room_id    = 4;
    gateway.pipelines.private.v1.Status status     = 5;
}

message CreateRequest {
    repeated gateway.pipelines.private.v1.CreateArgument arguments = 1;
}

message CreateResponse {
    repeated gateway.pipelines.private.v1.Pipeline pipelines = 1;
}

message CreateMutation {
    gateway.pipelines.private.v1.CreateArgument     foundation      = 1;
    repeated gateway.pipelines.private.v1.Transient transient       = 2;
    int64                                             begin_timestamp = 3;
    int64                                             close_timestamp = 4;
}

message CreateTransaction {
    repeated gateway.pipelines.private.v1.CreateMutation mutations = 1;
}

message UpdateArgument {
    gateway.pipelines.private.v1.Query                   query      = 1;
    optional gateway.pipelines.private.v1.OptionalString sfu_id     = 2;
    optional gateway.pipelines.private.v1.OptionalString user_id    = 3;
    optional gateway.pipelines.private.v1.OptionalString room_id    = 4;
    optional gateway.pipelines.private.v1.OptionalStatus status     = 5;
}

message UpdateRequest {
    repeated gateway.pipelines.private.v1.UpdateArgument arguments = 1;
}

message UpdateResponse {
    repeated gateway.pipelines.private.v1.Pipeline pipelines = 1;
}

message UpdateMutation {
    gateway.pipelines.private.v1.UpdateArgument     foundation      = 1;
    repeated gateway.pipelines.private.v1.Transient transient       = 2;
    int64                                             begin_timestamp = 3;
    int64                                             close_timestamp = 4;
}

message UpdateTransaction {
    repeated gateway.pipelines.private.v1.UpdateMutation mutations = 1;
}

message DeleteArgument {
    gateway.pipelines.private.v1.Query query = 1;
}

message DeleteRequest {
    repeated gateway.pipelines.private.v1.DeleteArgument arguments = 1;
}

message DeleteResponse {
    repeated gateway.pipelines.private.v1.Pipeline pipelines = 1;
}

message DeleteMutation {
    gateway.pipelines.private.v1.DeleteArgument     foundation      = 1;
//    gateway.pipelines.private.v1.DeleteCondition    condition       = 2;
    repeated gateway.pipelines.private.v1.Transient transient       = 2;
    int64                                             begin_timestamp = 3;
    int64                                             close_timestamp = 4;
}

//message DeleteCondition {
//    repeated room.connections.private.v1.DeleteMutation delete_pipeline_mutations = 1;
//}

message DeleteTransaction {
    repeated gateway.pipelines.private.v1.DeleteMutation mutations = 1;
}