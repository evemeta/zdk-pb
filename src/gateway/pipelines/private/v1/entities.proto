syntax = "proto3";

package gateway.pipelines.private.v1;

import "gateway/pipelines/private/v1/enums.proto";
import "common/orders/public/v1/entities.proto";

option go_package = "github.com/evemeta/zdk-pb/out/go/gateway/pipelines/private/v1;pipelinespb";

message Chunk {
    int64                                              size     = 1;
    int64                                              index    = 2;
    int64                                              total    = 3;
    repeated gateway.pipelines.private.v1.Pipeline entities = 4;
}

message Query {
    common.orders.public.v1.Order                     order      = 1;
    int64                                             limit      = 2;
    int64                                             offset     = 3;
    repeated gateway.pipelines.private.v1.Condition conditions = 4;
}

message Condition {
    repeated string                                ids         = 1;
    repeated string                                sfu_ids     = 2;
    repeated string                                user_ids    = 3;
    repeated string                                room_ids    = 4;
    repeated gateway.pipelines.private.v1.Status statuses    = 5;
}

message Transient {
    gateway.pipelines.private.v1.Pipeline future   = 1;
    gateway.pipelines.private.v1.Pipeline current  = 2;
    gateway.pipelines.private.v1.Pipeline previous = 3;
}

message Pipeline {
    string                                id          = 1;
    string                                sfu_id      = 2;
    string                                user_id     = 3;
    string                                room_id     = 4;
    gateway.pipelines.private.v1.Status status      = 5;
    int64                                 access_time = 6;
    int64                                 create_time = 7;
    int64                                 update_time = 8;
}
