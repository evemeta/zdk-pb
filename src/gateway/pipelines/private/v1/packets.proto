syntax = "proto3";

package gateway.pipelines.private.v1;

import "gateway/pipelines/private/v1/entities.proto";
import "gateway/pipelines/private/v1/optionals.proto";
import "common/timeframes/public/v1/entities.proto";

option go_package = "github.com/evemeta/zdk-pb/out/go/gateway/pipelines/private/v1;pipelinespb";

message CreatePipelinePacket {
    gateway.pipelines.private.v1.Pipeline pipeline = 1;
    common.timeframes.public.v1.Timeframe     timeframe  = 2;
}

message UpdatePipelinePacket {
    string                                                 id         = 1;
    string                                                 sfu_id     = 2;
    optional gateway.pipelines.private.v1.OptionalStatus status     = 3;
    common.timeframes.public.v1.Timeframe                  timeframe  = 4;
}

message DeletePipelinePacket {
    string                                id         = 1;
    string                                sfu_id     = 2;
    common.timeframes.public.v1.Timeframe timeframe  = 3;
}