syntax = "proto3";

package gateway.streamers.private.v1;

import "gateway/streamers/private/v1/enums.proto";
import "gateway/streamers/private/v1/entities.proto";
import "gateway/streamers/private/v1/optionals.proto";
import "gateway/connections/private/v1/procedures.proto";
import "gateway/streams/private/v1/procedures.proto";

option go_package = "github.com/evemeta/zdk-pb/out/go/gateway/streamers/private/v1;streamerspb";

message CountArgument {
    bool                               cache = 1;
    gateway.streamers.private.v1.Query query = 2;
}

message CountRequest {
    repeated gateway.streamers.private.v1.CountArgument arguments = 1;
}

message CountResponse {
    int64 total = 1;
}

message RangeArgument {
    bool                               cache = 1;
    gateway.streamers.private.v1.Query query = 2;
}

message RangeRequest {
    repeated gateway.streamers.private.v1.RangeArgument arguments = 1;
}

message RangeResponse {
    repeated gateway.streamers.private.v1.Chunk chunks = 1;
}

message SelectArgument {
    bool                               cache = 1;
    gateway.streamers.private.v1.Query query = 2;
}

message SelectRequest {
    repeated gateway.streamers.private.v1.SelectArgument arguments = 1;
}

message SelectResponse {
    repeated gateway.streamers.private.v1.Streamer streamers = 1;
}

message CreateArgument {
    string                              id            = 1;
    gateway.streamers.private.v1.Zone   zone          = 2;
    gateway.streamers.private.v1.Status status        = 3;
    string                              address       = 4;
    string                              relay_address = 5;
}

message CreateRequest {
    repeated gateway.streamers.private.v1.CreateArgument arguments = 1;
}

message CreateResponse {
    repeated gateway.streamers.private.v1.Streamer streamers = 1;
}

message CreateMutation {
    gateway.streamers.private.v1.CreateArgument     foundation      = 1;
    repeated gateway.streamers.private.v1.Transient transient       = 2;
    int64                                           begin_timestamp = 3;
    int64                                           close_timestamp = 4;
}

message CreateTransaction {
    repeated gateway.streamers.private.v1.CreateMutation mutations = 1;
}

message UpdateArgument {
    gateway.streamers.private.v1.Query                   query         = 1;
    optional gateway.streamers.private.v1.OptionalZone   zone          = 2;
    optional gateway.streamers.private.v1.OptionalStatus status        = 3;
    optional gateway.streamers.private.v1.OptionalString address       = 4;
    optional gateway.streamers.private.v1.OptionalString relay_address = 5;
}

message UpdateRequest {
    repeated gateway.streamers.private.v1.UpdateArgument arguments = 1;
}

message UpdateResponse {
    repeated gateway.streamers.private.v1.Streamer streamers = 1;
}

message UpdateMutation {
    gateway.streamers.private.v1.UpdateArgument     foundation      = 1;
    repeated gateway.streamers.private.v1.Transient transient       = 2;
    int64                                           begin_timestamp = 3;
    int64                                           close_timestamp = 4;
}

message UpdateTransaction {
    repeated gateway.streamers.private.v1.UpdateMutation mutations = 1;
}

message DeleteArgument {
    gateway.streamers.private.v1.Query query = 1;
}

message DeleteRequest {
    repeated gateway.streamers.private.v1.DeleteArgument arguments = 1;
}

message DeleteResponse {
    repeated gateway.streamers.private.v1.Streamer streamers = 1;
}

message DeleteMutation {
    gateway.streamers.private.v1.DeleteArgument     foundation      = 1;
    gateway.streamers.private.v1.DeleteCondition    condition       = 2;
    repeated gateway.streamers.private.v1.Transient transient       = 3;
    int64                                           begin_timestamp = 4;
    int64                                           close_timestamp = 5;
}

message DeleteCondition {
    repeated gateway.connections.private.v1.DeleteMutation delete_connection_mutations = 1;
    repeated gateway.streams.private.v1.DeleteMutation delete_stream_mutations = 2;
}

message DeleteTransaction {
    repeated gateway.streamers.private.v1.DeleteMutation mutations = 1;
}
