syntax = "proto3";

package gateway.streamers.private.v1;

import "gateway/streamers/private/v1/enums.proto";

option go_package = "github.com/evemeta/zdk-pb/out/go/gateway/streamers/private/v1;streamerspb";

// OptionalZone todo;
message OptionalZone {
    gateway.streamers.private.v1.Zone value = 1;
}

// OptionalStatus todo;
message OptionalStatus {
    gateway.streamers.private.v1.Status value = 1;
}

// OptionalString represents a string value that can be intentionally left unset or null.
// It allows for explicit control over the presence or absence of the string, accommodating scenarios where the string might be optional or intentionally omitted.
message OptionalString {
    string value = 1;
}