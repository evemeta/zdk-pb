syntax = "proto3";

package gateway.webhooks.private.v1;

import "gateway/webhooks/private/v1/entities.proto";
import "gateway/webhooks/private/v1/optionals.proto";
import "common/timeframes/public/v1/entities.proto";

option go_package = "github.com/evemeta/zdk-pb/out/go/gateway/webhooks/private/v1;webhookspb";

message CreateWebhookPacket {
    gateway.webhooks.private.v1.Webhook   webhook   = 1;
    common.timeframes.public.v1.Timeframe timeframe = 2;
}

message UpdateWebhookPacket {
    string                                                id        = 1;
    optional gateway.webhooks.private.v1.OptionalString   url       = 2;
    optional gateway.webhooks.private.v1.OptionalMethod   method    = 3;
    optional gateway.webhooks.private.v1.OptionalMap      headers   = 4;
    optional gateway.webhooks.private.v1.OptionalProtocol protocol  = 5;
    common.timeframes.public.v1.Timeframe                 timeframe = 6;
}

message DeleteWebhookPacket {
    string                                id        = 1;
    common.timeframes.public.v1.Timeframe timeframe = 2;
}
