syntax = "proto3";

package websocket.public.client.v1;

option java_multiple_files = true;
option java_package = "com.evemeta.zdk.pb.websocket.client.websocket";
option go_package = "github.com/evemeta/zdk-pb/out/go/websocket/public/client/v1;websocketpb";

message Message {
    string tag  = 1;
    string name = 2;
    bytes  data = 3;
}