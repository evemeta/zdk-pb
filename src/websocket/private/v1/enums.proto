syntax = "proto3";

package websocket.private.v1;

option go_package = "gitlab.com/evemeta/zdk/pb/out/go/websocket/private/v1;websocketpb";

enum Cause {
    CauseUnknown     = 0;
    CauseFailure     = 1;
    CauseTimeout     = 2;
    CauseRelocate    = 3;
    CauseDisconnect  = 4;
    CauseReintegrate = 5;
}