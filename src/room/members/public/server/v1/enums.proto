syntax = "proto3";

package members.public.server.v1;

import "protoc-gen-openapiv2/options/annotations.proto";

option go_package = "gitlab.com/evemeta/zdk/pb/out/go/room/members/public/server/v1;memberspb";
option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_swagger) = {};

// Order represents an enumeration that specifies the sort order for data retrieval, particularly in the context of querying.
enum Order {
    Order_Unknown    = 0;
    Order_Ascending  = 1;
    Order_Descending = 2;
}

// RestrictionType represents an enumeration that specifies the kinds of restrictions or actions that can be applied to a member.
enum RestrictionType {
    RestrictionType_Unknown = 0;
    RestrictionType_Block   = 1;
}

// ConnectionStatus todo;
enum ConnectionStatus {
    ConnectionStatus_Unknown = 0;
    ConnectionStatus_Connected = 1;
    ConnectionStatus_Connecting = 2;
    ConnectionStatus_Reconnecting = 3;
    ConnectionStatus_Disconnected = 4;
}

// Capability todo;
enum Capability {
    Capability_Unknown = 0;
    Capability_Audio = 1;
    Capability_Video = 2;
}