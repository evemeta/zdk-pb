syntax = "proto3";

package room.members.public.server.v1;

option java_multiple_files = true;
option java_package = "com.evemeta.zdk.pb.room.server.members";
option go_package = "github.com/evemeta/zdk-pb/out/go/room/members/public/server/v1;memberspb";

// Order represents an enumeration that specifies the sort order for data retrieval, particularly in the context of querying.
enum Order {
    OrderUnknown    = 0;
    OrderAscending  = 1;
    OrderDescending = 2;
}

// Status todo;
enum Status {
    StatusUnknown      = 0;
    StatusConnected    = 1;
    StatusDisconnected = 2;
}

// Permission todo;
enum Permission {
    PermissionUnknown            = 0;
    PermissionChat               = 100;
    PermissionChatBlock          = 101;
    PermissionChatUnblock        = 102;
    PermissionChatMute           = 103;
    PermissionChatUnmute         = 104;
    PermissionChatMessageDelete  = 105;
    PermissionChatKick           = 106;
    PermissionChatSlowmode       = 107;
    PermissionChatSlowmodeBypass = 108;
    PermissionRoom               = 200;
    PermissionRoomBlock          = 201;
    PermissionRoomUnblock        = 202;
    PermissionRoomKick           = 203;
}