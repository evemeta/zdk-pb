syntax = "proto3";

package room.members.private.v1;

import "room/members/private/v1/enums.proto";

option go_package = "gitlab.com/evemeta/zdk/pb/out/go/room/members/private/v1;memberspb";

message OptionalMap {
    map<string, string> value = 1;
}

message OptionalString {
    string value = 1;
}

message OptionalPermissions {
    repeated room.members.private.v1.Permission value = 1;
}