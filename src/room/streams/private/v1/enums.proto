syntax = "proto3";

package room.streams.private.v1;


option go_package = "gitlab.com/evemeta/zdk/pb/out/go/room/streams/private/v1;streamspb";

enum Kind {
    KindUnknown    = 0;
    KindMicrophone = 1;
    KindCamera     = 2;
    KindScreen     = 3;
    KindSpeaker    = 4;
}

enum Order {
    OrderUnknown    = 0;
    OrderAscending  = 1;
    OrderDescending = 2;
}

enum Status {
    StatusUnknown  = 0;
    StatusEnabled  = 1;
    StatusDisabled = 2;
}