syntax = "proto3";

package room.streams.public.server.v1;

option java_multiple_files = true;
option java_package = "com.evemeta.zdk.pb.room.server.streams";
option go_package = "gitlab.com/evemeta/zdk/pb/out/go/room/streams/public/server/v1;streamspb";

enum Kind {
    KindUnknown    = 0;
    KindMicrophone = 1;
    KindCamera     = 2;
    KindScreen     = 3;
    KindSpeaker    = 4;
}

// Order represents an enumeration that specifies the sort order for data retrieval, particularly in the context of querying.
enum Order {
    OrderUnknown    = 0;
    OrderAscending  = 1;
    OrderDescending = 2;
}

enum Status {
    StatusUnknown  = 0;
    StatusEnabled  = 1;
    StatusDisabled = 2;
}