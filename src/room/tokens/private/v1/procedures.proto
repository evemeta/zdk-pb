syntax = "proto3";

package room.tokens.private.v1;

import "room/members/private/v1/enums.proto";
import "room/members/private/v1/entities.proto";

option go_package = "gitlab.com/evemeta/zdk/pb/out/go/room/tokens/private/v1;tokenspb";

message CreateArgument {
    string                                       user_id     = 1;
    string                                       room_id    = 2;
    map<string, string>                          metadata    = 3;
    repeated room.members.private.v1.Permission permissions = 4;
}

message CreateRequest {
    repeated room.tokens.private.v1.CreateArgument arguments = 1;
}

message CreateResponse {
    repeated string tokens = 1;
}

message ExtractArgument {
    string token = 1;
}

message ExtractRequest {
    repeated room.tokens.private.v1.ExtractArgument arguments = 1;
}

message ExtractResponse {
    repeated members.private.v1.Member members = 1;
}