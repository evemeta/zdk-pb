syntax = "proto3";

package room.restrictions.public.server.v1;

import "room/restrictions/public/server/v1/entities.proto";

option java_multiple_files = true;
option java_package = "com.evemeta.zdk.pb.room.server.restrictions";
option go_package = "github.com/evemeta/zdk-pb/out/go/room/restrictions/public/server/v1;restrictionspb";

// CreateRestrictionPacket todo;
message CreateRestrictionPacket {
    // Represents the comprehensive details of the newly created restriction.
    room.restrictions.public.server.v1.Restriction restriction = 3;
    // Represents the specific span of time, containing the commence and complete timestamps associated with the event.
    room.restrictions.public.server.v1.Timeframe timeframe = 4;
}

// DeleteRestrictionPacket todo;
message DeleteRestrictionPacket {
    // todo;
    string id = 1;
    // todo;
    string room_id = 2;
    // todo;
    room.restrictions.public.server.v1.Timeframe timeframe = 4;
}