syntax = "proto3";

package room.rooms.public.server.v1;

import "room/rooms/public/server/v1/procedures.proto";

option java_multiple_files = true;
option java_package = "com.evemeta.zdk.pb.room.server.rooms";
option go_package = "github.com/evemeta/zdk-pb/out/go/room/rooms/public/server/v1;roomspb";

service Service {

    // Count represents a procedure that retrieves the total number of rooms based on a specific query.
    rpc Count(CountRequest) returns (CountResponse);

    // Range represents a procedure that retrieves a chunk of rooms based on a specific query.
    rpc Range(RangeRequest) returns (RangeResponse);

    // Select represents a procedure that retrieves specific rooms based on a specific query.
    rpc Select(SelectRequest) returns (SelectResponse);

    // Context represents a procedure that retrieves the context associated with a specific room based on its unique identifier.
    rpc Context(ContextRequest) returns (ContextResponse);
}