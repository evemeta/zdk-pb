syntax = "proto3";

package room.rooms.public.server.v1;

import "room/rooms/public/server/v1/entities.proto";
import "room/rooms/public/server/v1/optionals.proto";
import "room/members/public/server/v1/entities.proto";

option java_multiple_files = true;
option java_package = "com.evemeta.zdk.pb.room.server.rooms";
option go_package = "github.com/evemeta/zdk-pb/out/go/room/rooms/public/server/v1;roomspb";

// EnterRoomPacket is a notification sent to clients when a member has entered a room.
// It provides the details of the member entering and the relevant timeframe associated with the event.
message EnterRoomPacket {
    // Represents the comprehensive details of the member entering the room.
    room.members.public.server.v1.Member member = 1;
    // Represents the specific span of time, containing the commence and complete timestamps associated with the event.
    room.rooms.public.server.v1.Timeframe timeframe = 2;
}

// LeaveRoomPacket is a notification sent to clients when a member has left a room.
// It provides the details of the member leaving and the relevant timeframe associated with the event.
message LeaveRoomPacket {
    // Represents the comprehensive details of the member leaving the room.
    room.members.public.server.v1.Member member = 1;
    // Represents the specific span of time, containing the commence and complete timestamps associated with the event.
    room.rooms.public.server.v1.Timeframe timeframe = 2;
}

// CreateRoomPacket is a notification sent to clients when a new room has been created.
// It provides the details of the room and the relevant timeframe associated with the event.
message CreateRoomPacket {
    // Represents the comprehensive details of the newly created room.
    room.rooms.public.server.v1.Room room = 1;
    // Represents the specific span of time, containing the commence and complete timestamps associated with the event.
    room.rooms.public.server.v1.Timeframe timeframe = 2;
}

// UpdateRoomPacket is a notification sent to clients when a room has been updated.
// It provides the identifier of the room, updated details, and the relevant timeframe associated with the event.
message UpdateRoomPacket {
    // Represents the unique identifier of the room.
    string id = 1;
    // todo;
    optional room.rooms.public.server.v1.OptionalInt64 capacity = 2;
    // Represents a new or updated metadata associated with the room. It may be absent if no metadata changes occurred.
    optional room.rooms.public.server.v1.OptionalMap metadata = 3;
    // Represents the specific span of time, containing the commence and complete timestamps associated with the event.
    room.rooms.public.server.v1.Timeframe timeframe = 4;
}

// DeleteRoomPacket is a notification sent to clients when a room has been deleted.
// It provides the identifier of the room and the relevant timeframe associated with the event.
message DeleteRoomPacket {
    // Represents the unique identifier of the room.
    string id = 1;
    // Represents the specific span of time, containing the commence and complete timestamps associated with the event.
    room.rooms.public.server.v1.Timeframe timeframe = 2;
}

// InvokeRoomActionPacket todo;
message InvokeRoomActionPacket {
    // todo;
    string id = 1;
    // todo;
    string user_id = 2;
    // todo;
    string name = 3;
    // todo;
    map<string, string> data = 4;
}