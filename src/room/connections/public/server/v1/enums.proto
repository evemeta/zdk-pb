syntax = "proto3";

package room.connections.public.server.v1;

option java_multiple_files = true;
option java_package = "com.evemeta.zdk.pb.room.server.connections";
option go_package = "gitlab.com/evemeta/zdk/pb/out/go/room/connections/public/server/v1;connectionspb";

// Kind todo;
enum Kind {
    KindUnknown  = 0;
    KindReceive  = 1;
    KindTransmit = 2;
}

// Order represents an enumeration that specifies the sort order for data retrieval, particularly in the context of querying.
enum Order {
    OrderUnknown    = 0;
    OrderAscending  = 1;
    OrderDescending = 2;
}

// Status todo;
enum Status {
    StatusUnknown      = 0;
    StatusConnecting   = 1;
    StatusConnected    = 2;
    StatusReconnecting = 3;
}