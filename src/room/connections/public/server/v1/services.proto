syntax = "proto3";

package room.connections.public.server.v1;

import "room/connections/public/server/v1/procedures.proto";

option java_multiple_files = true;
option java_package = "com.evemeta.zdk.pb.room.server.connections";
option go_package = "github.com/evemeta/zdk-pb/out/go/room/connections/public/server/v1;connectionspb";

service Service {

    // Count represents a procedure that retrieves the total number of connections based on a specific query.
    rpc Count(CountRequest) returns (CountResponse);

    // Range represents a procedure that retrieves a chunk of connections based on a specific query.
    rpc Range(RangeRequest) returns (RangeResponse);

    // Select represents a procedure that retrieves specific connections based on a specific query.
    rpc Select(SelectRequest) returns (SelectResponse);
}