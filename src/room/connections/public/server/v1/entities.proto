syntax = "proto3";

package room.connections.public.server.v1;

import "room/connections/public/server/v1/enums.proto";

option java_multiple_files = true;
option java_package = "com.evemeta.zdk.pb.room.server.connections";
option go_package = "github.com/evemeta/zdk-pb/out/go/room/connections/public/server/v1;connectionspb";

// Chunk represents a segmented portion of connections used for pagination or segmented data retrieval.
// It provides insights about the desired chunk size, its position within the overall dataset, and the actual connections it contains.
message Chunk {
    // Represents the desired size of the chunk, not necessarily the actual number of entities it contains.
    int64 size = 1;
    // Represents the position of this chunk within the context of pagination.
    int64 index = 2;
    // Represents the total count of entities across all chunks.
    int64 total = 3;
    // Represents the actual connections included in this chunk.
    repeated room.connections.public.server.v1.Connection entities = 4;
}

// Query represents a structure designed to facilitate specific and conditional data retrieval.
// It contains order specifications, limitations on the number of results, and conditions to filter data.
message Query {
    // Represents the order in which results should be retrieved.
    room.connections.public.server.v1.Order order = 1;
    // Represents the maximum number of results to be fetched.
    int64 limit = 2;
    // Represents the starting point from which to retrieve results.
    int64 offset = 3;
    // Represents the set of conditions that filter the data retrieval process.
    room.connections.public.server.v1.Condition condition = 4;
}

// Condition represents a set of criteria designed to filter data during retrieval.
// It provides mechanisms to specifically target connections based on identifiers or room affiliations.
message Condition {
    // Represents a list of connection identifiers for targeted data retrieval.
    repeated string ids = 1;
    // todo;
    repeated string user_ids = 2;
    // Represents a list of room identifiers to filter connections based on their association.
    repeated string room_ids = 3;
}

// Timeframe represents a specific span or duration marked by its commencement and completion times.
// It provides a clear boundary to understand when a particular activity began and when it ended.
message Timeframe {
    // Represents the timestamp indicating when the activity or retrieve of data commenced.
    int64 commence = 1;
    // Represents the timestamp indicating when the activity or retrieve of data completed.
    int64 complete = 2;
}

// Connection todo;
message Connection {
    // Represents the unique identifier for this connection.
    string id = 1;
    string user_id = 2;
    string room_id = 3;
    room.connections.public.server.v1.Kind kind = 4;
    room.connections.public.server.v1.Status status = 5;
    int64 create_time = 6;
    int64 update_time = 7;
}
