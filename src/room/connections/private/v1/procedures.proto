syntax = "proto3";

package room.connections.private.v1;

import "room/connections/private/v1/enums.proto";
import "room/connections/private/v1/entities.proto";
import "room/connections/private/v1/optionals.proto";

option go_package = "github.com/evemeta/zdk-pb/out/go/room/connections/private/v1;connectionspb";

message CountArgument {
    bool                              cache = 1;
    room.connections.private.v1.Query query = 2;
}

message CountRequest {
    repeated room.connections.private.v1.CountArgument arguments = 1;
}

message CountResponse {
    int64 total = 1;
}

message RangeArgument {
    bool                              cache = 1;
    room.connections.private.v1.Query query = 2;
}

message RangeRequest {
    repeated room.connections.private.v1.RangeArgument arguments = 1;
}

message RangeResponse {
    repeated room.connections.private.v1.Chunk chunks = 1;
}

message SelectArgument {
    bool                              cache = 1;
    room.connections.private.v1.Query query = 2;
}

message SelectRequest {
    repeated room.connections.private.v1.SelectArgument arguments = 1;
}

message SelectResponse {
    repeated room.connections.private.v1.Connection connections = 1;
}

message CreateArgument {
    string                             id      = 1;
    string                             user_id = 2;
    string                             room_id = 3;
    room.connections.private.v1.Kind   kind    = 4;
    room.connections.private.v1.Status status  = 5;
}

message CreateRequest {
    repeated room.connections.private.v1.CreateArgument arguments = 1;
}

message CreateResponse {
    repeated room.connections.private.v1.Connection connections = 1;
}

message CreateMutation {
    room.connections.private.v1.CreateArgument     foundation      = 1;
    repeated room.connections.private.v1.Transient transient       = 2;
    int64                                          begin_timestamp = 3;
    int64                                          close_timestamp = 4;
}

message CreateTransaction {
    repeated room.connections.private.v1.CreateMutation mutations = 1;
}

message UpdateArgument {
    room.connections.private.v1.Query                   query   = 1;
    optional room.connections.private.v1.OptionalString user_id = 2;
    optional room.connections.private.v1.OptionalString room_id = 3;
    optional room.connections.private.v1.OptionalStatus status  = 4;
}

message UpdateRequest {
    repeated room.connections.private.v1.UpdateArgument arguments = 1;
}

message UpdateResponse {
    repeated room.connections.private.v1.Connection connections = 1;
}

message UpdateMutation {
    room.connections.private.v1.UpdateArgument     foundation      = 1;
    repeated room.connections.private.v1.Transient transient       = 2;
    int64                                          begin_timestamp = 3;
    int64                                          close_timestamp = 4;
}

message UpdateTransaction {
    repeated room.connections.private.v1.UpdateMutation mutations = 1;
}

message DeleteArgument {
    room.connections.private.v1.Query query = 1;
}

message DeleteRequest {
    repeated room.connections.private.v1.DeleteArgument arguments = 1;
}

message DeleteResponse {
    repeated room.connections.private.v1.Connection connections = 1;
}

message DeleteMutation {
    room.connections.private.v1.DeleteArgument     foundation      = 1;
    repeated room.connections.private.v1.Transient transient       = 2;
    int64                                          begin_timestamp = 3;
    int64                                          close_timestamp = 4;
}

message DeleteTransaction {
    repeated room.connections.private.v1.DeleteMutation mutations = 1;
}
