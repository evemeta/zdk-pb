syntax = "proto3";

package room.connections.private.v1;

import "room/connections/private/v1/enums.proto";

option go_package = "github.com/evemeta/zdk-pb/out/go/room/connections/private/v1;connectionspb";

message Chunk {
    int64                                           size     = 1;
    int64                                           index    = 2;
    int64                                           total    = 3;
    repeated room.connections.private.v1.Connection entities = 4;
}

message Query {
    room.connections.private.v1.Order              order      = 1;
    int64                                          limit      = 2;
    int64                                          offset     = 3;
    repeated room.connections.private.v1.Condition conditions = 4;
}

message Condition {
    repeated string                             ids      = 1;
    repeated string                             user_ids = 2;
    repeated string                             room_ids = 3;
    repeated room.connections.private.v1.Kind   kinds    = 4;
    repeated room.connections.private.v1.Status statuses = 5;
}

message Transient {
    room.connections.private.v1.Connection future   = 1;
    room.connections.private.v1.Connection current  = 2;
    room.connections.private.v1.Connection previous = 3;
}

message Connection {
    string                             id           = 1;
    string                             user_id      = 2;
    string                             room_id      = 3;
    room.connections.private.v1.Kind   kind         = 4;
    room.connections.private.v1.Status status       = 5;
    int64                              access_time  = 6;
    int64                              create_time  = 7;
    int64                              update_time  = 8;
}