syntax = "proto3";

package room.connections.private.v1;

option go_package = "github.com/evemeta/zdk-pb/out/go/room/connections/private/v1;connectionspb";

enum Kind {
    KindUnknown  = 0;
    KindReceive  = 1;
    KindTransmit = 2;
}

enum Order {
    OrderUnknown    = 0;
    OrderAscending  = 1;
    OrderDescending = 2;
}

enum Status {
    StatusUnknown      = 0;
    StatusConnecting   = 1;
    StatusConnected    = 2;
    StatusReconnecting = 3;
}